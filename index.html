                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                  <button onClick={() => markLearning(safeCard)}
                    className="font-body text-xs flex items-center justify-center gap-1.5 px-3 py-2 border-2 border-sky-700 text-sky-900 bg-sky-50 hover:bg-sky-100">
                    <Icon name="Lightbulb" size={12} /> Still learning
                  </button>
                  <button onClick={() => markKnown(safeCard)}
                    className="font-body text-xs flex items-center justify-center gap-1.5 px-3 py-2 border-2 border-emerald-700 text-emerald-900 bg-emerald-50 hover:bg-emerald-100">
                    <Icon name="Check" size={12} /> I know it
                  </button>
                  <button onClick={() => clearMastery(safeCard)}
                    className="font-body text-xs flex items-center justify-center gap-1.5 px-3 py-2 border border-stone-400 text-stone-600 hover:bg-stone-200 col-span-2 sm:col-span-1">
                    Clear mark
                  </button>
                </div>

                <div className="font-body text-[11px] text-stone-500 flex items-center gap-2 pt-1">
                  <Icon name="Keyboard" size={12} />
                  <span>← / → navigate · Space flip · F flag · K known · L learning · P listen</span>
                  {cardCounts.flagged > 0 && (
                    <button onClick={clearAllFlagsC} className="ml-auto underline hover:text-stone-700">clear all flags</button>
                  )}
                </div>
              </>
            ) : (
              <div className="bg-stone-50 border border-stone-300 p-8 text-center">
                <p className="font-display text-lg text-stone-700 mb-2">No cards match this filter.</p>
                <p className="font-body text-sm text-stone-600">Try a different status, more domains, or <button onClick={() => setCardStatusFilter('all')} className="underline">reset to all cards</button>.</p>
              </div>
            )}
          </div>
        )}

        {/* PRACTICE */}
        {activeTab === 'practice' && (
          <div className="space-y-5">
            {/* Filter panel */}
            <div className="bg-white/70 border border-stone-300 p-4 sm:p-5 divide-y divide-stone-200">
              <FilterRow label="Domains">
                {ALL_DOMS.map(d => (
                  <Chip key={d} active={quizDomains.has(d)} onClick={() => toggleQuizDomain(d)}
                    count={questions.filter(q => q.cat === d).length}>
                    {d.replace('Domain ', 'D')}
                  </Chip>
                ))}
                <Chip active={quizDomains.size === 4} onClick={() => { setQuizDomains(new Set(ALL_DOMS)); setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false); }}>All</Chip>
              </FilterRow>
              <FilterRow label="Filter">
                <Chip active={quizStatus === 'all'}     onClick={() => setQuizStatusFilter('all')}     count={quizCounts.total}>All</Chip>
                <Chip active={quizStatus === 'flagged'} onClick={() => setQuizStatusFilter('flagged')} color="amber"   count={quizCounts.flagged}>
                  <Icon name="Star" size={11} fill={quizStatus === 'flagged' ? 'currentColor' : 'none'} /> Flagged
                </Chip>
                <Chip active={quizStatus === 'wrong'}   onClick={() => setQuizStatusFilter('wrong')}   color="rose"    count={quizCounts.wrong}>
                  <Icon name="X" size={11} /> Wrong
                </Chip>
                <Chip active={quizStatus === 'correct'} onClick={() => setQuizStatusFilter('correct')} color="emerald" count={quizCounts.correct}>
                  <Icon name="Check" size={11} /> Correct
                </Chip>
                <Chip active={quizStatus === 'unseen'}  onClick={() => setQuizStatusFilter('unseen')}                  count={quizCounts.unseen}>Unseen</Chip>
              </FilterRow>
              <FilterRow label="Order">
                <Chip active={questionOrder === 'sequential'} onClick={() => { setQuestionOrder('sequential'); setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false); }}>Sequential</Chip>
                <Chip active={questionOrder === 'shuffle'}    onClick={() => { setQuestionOrder('shuffle'); setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false); }} color="amber">
                  <Icon name="Shuffle" size={11} /> Shuffle
                </Chip>
              </FilterRow>
              <FilterRow label="Mode">
                <Chip active={studyMode === 'study'} onClick={() => setStudyMode('study')}>
                  <Icon name="Lightbulb" size={11} /> Study (reveal immediately)
                </Chip>
                <Chip active={studyMode === 'test'} onClick={() => setStudyMode('test')} color="sky">
                  <Icon name="GraduationCap" size={11} /> Test (hide rationale)
                </Chip>
                <button onClick={() => setQuestionPaletteOpen(o => !o)}
                  className="font-body text-xs px-3 py-1.5 rounded-full border border-stone-400 bg-white/60 text-stone-700 hover:bg-stone-200 inline-flex items-center gap-1">
                  <Icon name="Grid" size={11} /> {questionPaletteOpen ? 'Hide palette' : 'Show palette'}
                </button>
                <button onClick={resetQuizProgress}
                  className="font-body text-xs px-3 py-1.5 rounded-full border border-stone-400 bg-white/60 text-stone-600 hover:bg-stone-200 inline-flex items-center gap-1">
                  <Icon name="Trash" size={11} /> Reset progress
                </button>
              </FilterRow>
              {ttsAvailable && (
                <FilterRow label="Audio">
                  <Chip active={ttsEnabled} onClick={() => { setTtsEnabled(!ttsEnabled); if (ttsEnabled) stopSpeak(); }} color="sky">
                    <Icon name="Headphones" size={11} /> {ttsEnabled ? 'On' : 'Off'}
                  </Chip>
                  {ttsEnabled && (
                    <>
                      <Chip active={ttsAutoStem} onClick={() => setTtsAutoStem(!ttsAutoStem)}>Auto-play question</Chip>
                      {voices.length > 1 && (
                        <select value={ttsVoiceURI} onChange={e => setTtsVoiceURI(e.target.value)}
                          className="font-body text-xs px-2 py-1 rounded-full border border-stone-400 bg-white/60 text-stone-700 max-w-[180px]">
                          <option value="">Default voice</option>
                          {voices.map(v => <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>)}
                        </select>
                      )}
                      <label className="inline-flex items-center gap-2 px-2 py-1 rounded-full border border-stone-400 bg-white/60 text-stone-700 text-xs">
                        <span className="text-[10px] uppercase tracking-wider text-stone-500">Speed</span>
                        <input type="range" min="0.6" max="1.6" step="0.1" value={ttsRate}
                          onChange={e => setTtsRate(parseFloat(e.target.value))}
                          className="w-20 accent-stone-700" />
                        <span className="tabular-nums w-7 text-right">{ttsRate.toFixed(1)}×</span>
                      </label>
                    </>
                  )}
                </FilterRow>
              )}
            </div>

            {/* Session score + per-domain bar */}
            <div className="grid sm:grid-cols-2 gap-3">
              <div className="bg-stone-900 text-stone-100 p-4">
                <div className="text-[10px] tracking-[0.3em] uppercase text-amber-200">Session Score</div>
                <div className="mt-1 flex items-baseline gap-2">
                  <span className="font-display text-3xl font-bold tabular-nums">{sessionScore.correct}</span>
                  <span className="font-display text-xl text-stone-400 tabular-nums">/ {sessionScore.answered}</span>
                  {sessionScore.answered > 0 && (
                    <span className="font-body text-sm text-stone-300 tabular-nums">({Math.round((sessionScore.correct / sessionScore.answered) * 100)}%)</span>
                  )}
                </div>
                <div className="text-[11px] text-stone-400 mt-1">across all domains · saved to this browser</div>
              </div>
              <div className="bg-white/70 border border-stone-300 p-4">
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 mb-2">By Domain</div>
                <div className="space-y-1.5">
                  {ALL_DOMS.map(d => {
                    const s = domainScores[d];
                    const pct = s.answered ? Math.round((s.correct / s.answered) * 100) : 0;
                    return (
                      <div key={d} className="flex items-center gap-2 text-[11px] font-body">
                        <span className="w-7 text-stone-600">{d.replace('Domain ', 'D')}</span>
                        <div className="flex-1 h-1.5 bg-stone-200 relative overflow-hidden">
                          <div className="absolute inset-y-0 left-0" style={{ width: `${s.answered ? (s.correct / s.total) * 100 : 0}%`, background: '#047857' }}></div>
                          <div className="absolute inset-y-0" style={{ left: `${s.answered ? (s.correct / s.total) * 100 : 0}%`, width: `${s.answered ? (s.wrong / s.total) * 100 : 0}%`, background: '#be123c' }}></div>
                        </div>
                        <span className="tabular-nums text-stone-600 w-16 text-right">{s.correct}/{s.answered} · {pct}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Palette */}
            {questionPaletteOpen && (
              <div className="bg-stone-50 border border-stone-300 p-3 max-h-44 overflow-y-auto">
                {filteredQuestions.length === 0 ? (
                  <div className="text-xs text-stone-500 italic">No questions in current filter.</div>
                ) : (
                  <div className="flex flex-wrap gap-1">
                    {filteredQuestions.map((q, i) => {
                      const id = qid(q);
                      const r = questionResults[id];
                      const isFlagged = flaggedQ.has(id);
                      const isCurrent = i === (currentQ % filteredQuestions.length);
                      let bg = 'bg-white border-stone-300 text-stone-600';
                      if (r === 'correct') bg = 'bg-emerald-100 border-emerald-500 text-emerald-900';
                      else if (r === 'wrong') bg = 'bg-rose-100 border-rose-500 text-rose-900';
                      if (isCurrent) bg += ' ring-2 ring-stone-900 ring-offset-1';
                      return (
                        <button key={id} onClick={() => jumpToQuestion(i)}
                          title={`${q.cat} · ${q.stem.slice(0, 80)}${q.stem.length > 80 ? '…' : ''}`}
                          className={`relative w-7 h-7 text-[10px] font-body font-semibold border tabular-nums ${bg} hover:opacity-80 transition`}>
                          {i + 1}
                          {isFlagged && <span className="absolute -top-1 -right-1 text-amber-600" style={{fontSize:9}}>★</span>}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {safeQ ? (
              <>
                <div className="font-body text-xs text-stone-600 flex items-center justify-between flex-wrap gap-2">
                  <span>Question <span className="font-bold tabular-nums">{(currentQ % filteredQuestions.length) + 1}</span> of <span className="tabular-nums">{filteredQuestions.length}</span> · {safeQ.cat}</span>
                  <button onClick={() => toggleFlagQ(safeQ)}
                    className={`flex items-center gap-1 px-2 py-1 rounded-sm border transition ${flaggedQ.has(qid(safeQ)) ? 'bg-amber-100 border-amber-600 text-amber-900' : 'border-stone-400 text-stone-600 hover:bg-stone-200'}`}
                    title="Flag (F)">
                    <Icon name="Star" size={12} fill={flaggedQ.has(qid(safeQ)) ? 'currentColor' : 'none'} />
                    <span className="text-[10px] uppercase tracking-widest">{flaggedQ.has(qid(safeQ)) ? 'Flagged' : 'Flag'}</span>
                  </button>
                </div>

                <div className="bg-white/70 border border-stone-300 p-5 sm:p-7">
                  <div className="flex items-start gap-3 mb-6">
                    <p className="font-body text-base text-stone-900 leading-relaxed flex-1">{safeQ.stem}</p>
                    <SpeakButton text={safeQ.stem} id={'q-stem-' + qid(safeQ)} />
                  </div>

                  <div className="flex items-center justify-between mb-2">
                    <span className="font-body text-[10px] tracking-[0.25em] uppercase text-stone-500">Options</span>
                    <SpeakButton text={composeOptionsText(safeQ)} id={'q-opts-' + qid(safeQ)} label="Listen A–D" />
                  </div>

                  <div className="space-y-2">
                    {safeQ.options.map((opt, i) => {
                      const isCorrect = i === safeQ.correct;
                      const isSelected = i === selectedAnswer;
                      let bg = 'bg-stone-50 hover:bg-stone-100 border-stone-300';
                      let iconNode = null;
                      if (selectedAnswer !== null) {
                        // Always reveal correct answer once the user picks; rationale text behavior follows studyMode.
                        if (isCorrect) { bg = 'bg-emerald-50 border-emerald-600'; iconNode = <Icon name="Check" size={18} className="text-emerald-700 flex-shrink-0" />; }
                        else if (isSelected) { bg = 'bg-rose-50 border-rose-600'; iconNode = <Icon name="X" size={18} className="text-rose-700 flex-shrink-0" />; }
                      }
                      return (
                        <button key={i} onClick={() => handleAnswer(i)} disabled={selectedAnswer !== null}
                          className={`w-full text-left p-3 sm:p-4 border-2 transition-all font-body text-sm flex items-start gap-3 ${bg} ${selectedAnswer !== null ? 'cursor-default' : 'cursor-pointer'}`}>
                          <span className="font-bold text-stone-700 flex-shrink-0">{String.fromCharCode(65 + i)}.</span>
                          <span className="flex-1 text-stone-900 leading-snug">{opt}</span>
                          {iconNode}
                        </button>
                      );
                    })}
                  </div>

                  {showRationale && (
                    <div className="mt-5 p-4 border-l-4 bg-stone-100" style={{ borderColor: '#8B6F47' }}>
                      <div className="flex items-center justify-between mb-2">
                        <div className="font-body text-xs tracking-widest uppercase text-stone-600">Rationale</div>
                        <SpeakButton text={safeQ.rationale} id={'q-rationale-' + qid(safeQ)} />
                      </div>
                      <p className="font-body text-sm text-stone-800 leading-relaxed">{safeQ.rationale}</p>
                    </div>
                  )}

                  {selectedAnswer !== null && !showRationale && studyMode === 'test' && (
                    <div className="mt-5">
                      <button onClick={revealRationale} className="font-body text-xs px-3 py-2 border border-stone-600 text-stone-700 hover:bg-stone-200 inline-flex items-center gap-1.5">
                        <Icon name="Eye" size={12} /> Reveal rationale
                      </button>
                    </div>
                  )}
                </div>

                <div className="flex justify-between items-center gap-2 flex-wrap">
                  <button onClick={prevQuestion} className="font-body text-sm flex items-center gap-1 px-4 py-2 border border-stone-900 text-stone-900 hover:bg-stone-200">
                    <Icon name="ChevronLeft" size={16} /> Prev
                  </button>
                  {selectedAnswer === null && (
                    <span className="font-body text-[11px] text-stone-500 italic">Pick an answer · or press 1–4</span>
                  )}
                  <button onClick={nextQuestion} className="font-body text-sm flex items-center gap-1 px-5 py-2 bg-stone-900 text-stone-50 hover:bg-stone-700">
                    Next <Icon name="ChevronRight" size={16} />
                  </button>
                </div>

                <div className="font-body text-[11px] text-stone-500 flex items-center gap-2 pt-1 flex-wrap">
                  <Icon name="Keyboard" size={12} />
                  <span>← / → navigate · 1–4 select · Space next · F flag · R reveal · P listen</span>
                  {quizCounts.flagged > 0 && (
                    <button onClick={clearAllFlagsQ} className="ml-auto underline hover:text-stone-700">clear all flags</button>
                  )}
                </div>
              </>
            ) : (
              <div className="bg-stone-50 border border-stone-300 p-8 text-center">
                <p className="font-display text-lg text-stone-700 mb-2">No questions match this filter.</p>
                <p className="font-body text-sm text-stone-600">Try a different status, more domains, or <button onClick={() => setQuizStatusFilter('all')} className="underline">reset to all questions</button>.</p>
              </div>
            )}
          </div>
        )}

        {/* KANSAS */}
        {activeTab === 'kansas' && (
          <div className="space-y-6">
            <section>
              <h2 className="font-display text-2xl font-bold text-stone-900 mb-2">Kansas BSRB — LMSW Requirements</h2>
              <p className="font-body text-sm text-stone-700 mb-4">The Kansas Behavioral Sciences Regulatory Board (BSRB) issues and regulates the LMSW credential.</p>
              <div className="space-y-3">
                {[
                  { label: 'Degree', val: 'MSW from a CSWE-accredited program (or meeting K.A.R. 102-2-6).' },
                  { label: 'Application', val: 'Submit application to BSRB at least 6 weeks before desired exam date. May apply up to 4 months before graduation.' },
                  { label: 'References', val: 'Three references: one from your most recent fieldwork supervisor, two from social workers licensed at LMSW level or above.' },
                  { label: 'Background check', val: 'Required as part of application.' },
                  { label: 'Exam', val: 'ASWB Masters at Pearson VUE. Passing scaled score: 70.' },
                  { label: 'License fee', val: '$150 once exam is passed.' },
                  { label: 'Temporary license', val: '$50; valid until full license or 6 months, whichever first; non-renewable.' },
                  { label: 'Continuing education', val: '40 contact hours per 2-year renewal cycle, including 6 hours in ethics.' },
                ].map((item, i) => (
                  <div key={i} className="bg-white/70 border border-stone-300 p-4 flex flex-col sm:flex-row sm:gap-4">
                    <div className="font-body text-xs uppercase tracking-wider text-stone-600 sm:w-40 flex-shrink-0 mb-1 sm:mb-0">{item.label}</div>
                    <div className="font-body text-sm text-stone-900 leading-snug">{item.val}</div>
                  </div>
                ))}
              </div>
            </section>

            <section>
              <h2 className="font-display text-2xl font-bold text-stone-900 mb-3">LMSW Scope of Practice in Kansas</h2>
              <div className="grid sm:grid-cols-2 gap-3">
                <div className="bg-emerald-50/60 border-l-4 border-emerald-700 p-4">
                  <h3 className="font-display font-bold text-emerald-900 mb-2">An LMSW may do</h3>
                  <ul className="font-body text-sm text-stone-800 space-y-1 leading-snug">
                    <li>· Non-clinical social work independently</li>
                    <li>· Case management, advocacy, community organizing</li>
                    <li>· Psychosocial assessment</li>
                    <li>· Clinical work under approved BSRB supervision plan</li>
                    <li>· Program development and policy work</li>
                  </ul>
                </div>
                <div className="bg-rose-50/60 border-l-4 border-rose-700 p-4">
                  <h3 className="font-display font-bold text-rose-900 mb-2">An LMSW may NOT do</h3>
                  <ul className="font-body text-sm text-stone-800 space-y-1 leading-snug">
                    <li>· Independent diagnosis or psychotherapy</li>
                    <li>· Practice outside scope of supervision</li>
                    <li>· Bill Medicare independently as LMSW</li>
                    <li>· Sign off on clinical work for others</li>
                  </ul>
                </div>
              </div>
            </section>

            <section>
              <h2 className="font-display text-2xl font-bold text-stone-900 mb-3">Pathway to LSCSW</h2>
              <div className="bg-stone-900 text-stone-100 p-5">
                <div className="grid sm:grid-cols-2 gap-4 font-body text-sm">
                  <div><div className="text-amber-200 text-xs tracking-widest uppercase mb-1">Total Hours</div><div className="font-display text-2xl font-bold">4,000</div></div>
                  <div><div className="text-amber-200 text-xs tracking-widest uppercase mb-1">Direct Contact</div><div className="font-display text-2xl font-bold">2,000</div></div>
                  <div><div className="text-amber-200 text-xs tracking-widest uppercase mb-1">Assessment/Psychotherapy</div><div className="font-display text-2xl font-bold">1,500</div></div>
                  <div><div className="text-amber-200 text-xs tracking-widest uppercase mb-1">Supervision Hours</div><div className="font-display text-2xl font-bold">110</div></div>
                </div>
                <p className="font-body text-xs text-stone-300 mt-4 leading-relaxed">Supervision must occur over a minimum 2-year period. No more than 60 of the 110 hours may be group supervision, and groups must be 6 or fewer. Also requires 15 graduate credit hours in diagnosis and treatment of mental disorders.</p>
              </div>
            </section>

            <section>
              <h2 className="font-display text-2xl font-bold text-stone-900 mb-3">Critical Kansas Reporting Numbers</h2>
              <div className="space-y-3">
                <div className="bg-amber-50/70 border-2 border-stone-900 p-4">
                  <div className="font-body text-xs tracking-widest uppercase text-stone-600">Kansas Protection Report Center (DCF)</div>
                  <div className="font-display text-2xl font-bold text-stone-900 mt-1">1-800-922-5330</div>
                  <div className="font-body text-sm text-stone-700 mt-1">Child abuse/neglect AND adult protective services. 24/7. Reasonable suspicion required, not proof.</div>
                </div>
                <div className="bg-stone-50 border border-stone-400 p-4">
                  <div className="font-body text-xs tracking-widest uppercase text-stone-600">Kansas Suicide & Crisis Lifeline</div>
                  <div className="font-display text-2xl font-bold text-stone-900 mt-1">988</div>
                  <div className="font-body text-sm text-stone-700 mt-1">National Suicide and Crisis Lifeline; call or text.</div>
                </div>
                <div className="bg-stone-50 border border-stone-400 p-4">
                  <div className="font-body text-xs tracking-widest uppercase text-stone-600">Kansas BSRB</div>
                  <div className="font-display text-base font-bold text-stone-900 mt-1">ksbsrb.ks.gov · (785) 296-3240</div>
                  <div className="font-body text-sm text-stone-700 mt-1">Licensure questions, complaints, CE verification.</div>
                </div>
              </div>
            </section>
          </div>
        )}

        {/* Footer */}
        <footer className="mt-12 pt-6 border-t border-stone-300">
          <p className="font-body text-xs text-stone-600 leading-relaxed">
            <Icon name="Sparkles" size={12} className="inline mr-1" />
            Reflects the ASWB content effective in 2026, including the August 3, 2026 blueprint transition, NASW Code of Ethics, DSM-5-TR (2022), and Kansas BSRB requirements. Cross-reference with the official ASWB 2026 Examination Guidebook and current Kansas BSRB statutes. Practice questions are designed in ASWB style but are not actual exam items.
          </p>
          <div className="mt-3 flex items-center justify-center">
            <button onClick={() => setShowEasterEgg(true)} aria-label="A little surprise"
              className="text-stone-400 hover:text-rose-500 transition-colors duration-300 p-1" title="·">
              <Icon name="Heart" size={10} fill="currentColor" />
            </button>
          </div>
        </footer>

        {showEasterEgg && (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overlay-enter"
            style={{ background: 'rgba(28, 25, 23, 0.6)', backdropFilter: 'blur(8px)' }}
            onClick={() => setShowEasterEgg(false)}>
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              {[...Array(8)].map((_, i) => (
                <div key={i} className="absolute float-heart"
                  style={{ left: `${10 + (i * 11)}%`, bottom: '20%', animationDelay: `${i * 0.3}s`, color: ['#e8a5b8', '#d4849a', '#f0bfc9', '#c97389'][i % 4] }}>
                  <Icon name="Heart" size={16 + (i % 3) * 4} fill="currentColor" />
                </div>
              ))}
            </div>
            <div className="relative modal-enter max-w-sm w-full" onClick={(e) => e.stopPropagation()}
              style={{ background: 'linear-gradient(135deg, #fdf2f4 0%, #fce7ec 50%, #f9d5dd 100%)', border: '2px solid #1c1917', boxShadow: '10px 10px 0 #1c1917' }}>
              <button onClick={() => setShowEasterEgg(false)} className="absolute top-3 right-3 text-stone-600 hover:text-stone-900 transition-colors" aria-label="Close">
                <Icon name="X" size={18} />
              </button>
              <div className="p-8 sm:p-10 text-center">
                <div className="flex justify-center mb-5">
                  <div className="heart-pulse" style={{ color: '#c97389' }}>
                    <Icon name="Heart" size={56} fill="currentColor" strokeWidth={1.5} />
                  </div>
                </div>
                <p className="font-display text-3xl sm:text-4xl font-bold text-stone-900 mb-2 italic">love you!</p>
                <p className="font-display text-xl text-stone-700 italic">~A</p>
                <div className="flex items-center justify-center gap-2 my-5">
                  <div className="h-px w-12" style={{ background: '#c97389' }}></div>
                  <Icon name="Heart" size={8} fill="#c97389" style={{ color: '#c97389' }} />
                  <div className="h-px w-12" style={{ background: '#c97389' }}></div>
                </div>
                <p className="font-body text-sm text-stone-700 leading-relaxed italic">You're going to crush this exam.<br/>Take a deep breath. You've got this.</p>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<LMSWStudyTool />);
</script>
</body>
</html>
