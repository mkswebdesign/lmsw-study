  .font-body { font-family: 'Inter', system-ui, sans-serif; }
  .card-flip { transform-style: preserve-3d; transition: transform .6s cubic-bezier(.4,0,.2,1); }
  .card-flip.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .card-back { transform: rotateY(180deg); }
  .grain::before {
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 15%{transform:scale(1.2)} 30%{transform:scale(1)} 45%{transform:scale(1.2)} 60%{transform:scale(1)} }
  @keyframes fadeInScale { 0%{opacity:0;transform:scale(.85) translateY(20px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
  @keyframes float-up { 0%{opacity:0;transform:translateY(0) scale(.5)} 50%{opacity:1} 100%{opacity:0;transform:translateY(-60px) scale(1.2)} }
  .heart-pulse { animation: heartbeat 2s ease-in-out infinite; }
  .modal-enter { animation: fadeInScale .5s cubic-bezier(.34,1.56,.64,1); }
  .overlay-enter { animation: fadeIn .3s ease-out; }
  .float-heart { animation: float-up 2s ease-out infinite; }

const { useState, useMemo, useEffect } = React;

const Icon = ({ name, size = 16, className = '', style = {}, fill = 'none', strokeWidth = 2 }) => {
  const d = ICONS[name];
  if (!d) return null;
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
      <path d={d} />
    </svg>
  );
};

// ============ PERSISTENCE + ID HELPERS ============
const LS = 'lmsw_';
const loadSet = (k) => { try { return new Set(JSON.parse(localStorage.getItem(LS + k) || '[]')); } catch { return new Set(); } };
const saveSet = (k, set) => { try { localStorage.setItem(LS + k, JSON.stringify([...set])); } catch {} };
const loadObj = (k) => { try { return JSON.parse(localStorage.getItem(LS + k) || '{}'); } catch { return {}; } };
const saveObj = (k, obj) => { try { localStorage.setItem(LS + k, JSON.stringify(obj)); } catch {} };
const hashId = (s) => { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h.toString(36); };
const qid = (q) => hashId('q|' + q.cat + '|' + q.stem);
const cid = (c) => hashId('c|' + c.cat + '|' + c.front);
const ALL_DOMS = ['Domain 1','Domain 2','Domain 3','Domain 4'];

// Toggle-chip primitive
const Chip = ({ active, onClick, children, color = 'stone', count, disabled }) => (
  <button onClick={onClick} disabled={disabled}
    className={`font-body text-xs px-3 py-1.5 rounded-full border transition-all inline-flex items-center gap-1.5 ${
      disabled ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'
    } ${
      active
        ? (color === 'amber' ? 'bg-amber-700 text-amber-50 border-amber-700'
          : color === 'emerald' ? 'bg-emerald-700 text-emerald-50 border-emerald-700'
          : color === 'rose' ? 'bg-rose-700 text-rose-50 border-rose-700'
          : color === 'sky' ? 'bg-sky-700 text-sky-50 border-sky-700'
          : 'bg-stone-900 text-stone-50 border-stone-900')
        : 'bg-white/60 text-stone-700 border-stone-400 hover:bg-stone-200'
    }`}>
    {children}
    {count != null && <span className={`text-[10px] tabular-nums font-semibold ${active ? 'opacity-80' : 'text-stone-500'}`}>{count}</span>}
  </button>
);

const FilterRow = ({ label, children }) => (
  <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 py-2">
    <div className="font-body text-[10px] tracking-[0.25em] uppercase text-stone-500 sm:w-16 flex-shrink-0">{label}</div>
    <div className="flex flex-wrap gap-1.5">{children}</div>
  </div>
);

function LMSWStudyTool() {
  const [activeTab, setActiveTab] = useState('overview');
  const [activeDomain, setActiveDomain] = useState('domain1');
  const [showEasterEgg, setShowEasterEgg] = useState(false);

  // Flashcard session
  const [flashcardIndex, setFlashcardIndex] = useState(0);
  const [flashcardFlipped, setFlashcardFlipped] = useState(false);
  const [cardDomains, setCardDomains] = useState(() => new Set(ALL_DOMS));
  const [cardStatus, setCardStatus] = useState('all'); // all|flagged|learning|known|new
  const [cardOrder, setCardOrder] = useState('sequential');
  const [cardPaletteOpen, setCardPaletteOpen] = useState(false);

  // Practice session
  const [currentQ, setCurrentQ] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showRationale, setShowRationale] = useState(false);
  const [quizDomains, setQuizDomains] = useState(() => new Set(ALL_DOMS));
  const [quizStatus, setQuizStatus] = useState('all'); // all|flagged|wrong|unseen|correct
  const [questionOrder, setQuestionOrder] = useState('sequential');
  const [studyMode, setStudyMode] = useState('study'); // study (reveal immediately) | test (defer)
  const [questionPaletteOpen, setQuestionPaletteOpen] = useState(false);

  // Persistent (localStorage)
  const [flaggedQ, setFlaggedQ] = useState(() => loadSet('flagQ'));
  const [flaggedC, setFlaggedC] = useState(() => loadSet('flagC'));
  const [knownC, setKnownC] = useState(() => loadSet('knownC'));
  const [learningC, setLearningC] = useState(() => loadSet('learningC'));
  const [questionResults, setQuestionResults] = useState(() => loadObj('qResults'));

  // ============ TEXT-TO-SPEECH ============
  const ttsAvailable = typeof window !== 'undefined' && 'speechSynthesis' in window;
  const ttsPrefs0 = loadObj('ttsPrefs');
  const [ttsEnabled, setTtsEnabled] = useState(ttsPrefs0.enabled !== false);
  const [ttsRate, setTtsRate]       = useState(typeof ttsPrefs0.rate === 'number' ? ttsPrefs0.rate : 1.0);
  const [ttsVoiceURI, setTtsVoiceURI] = useState(ttsPrefs0.voiceURI || '');
  const [ttsAutoStem, setTtsAutoStem] = useState(ttsPrefs0.autoStem === true);
  const [ttsAutoBack, setTtsAutoBack] = useState(ttsPrefs0.autoBack === true);
  const [voices, setVoices] = useState([]);
  const [speakingId, setSpeakingId] = useState(null);

  // Persist TTS prefs
  useEffect(() => {
    saveObj('ttsPrefs', {
      enabled: ttsEnabled, rate: ttsRate, voiceURI: ttsVoiceURI,
      autoStem: ttsAutoStem, autoBack: ttsAutoBack,
    });
  }, [ttsEnabled, ttsRate, ttsVoiceURI, ttsAutoStem, ttsAutoBack]);

  // Load voices (populated asynchronously in Chrome)
  useEffect(() => {
    if (!ttsAvailable) return;
    const load = () => {
      const list = window.speechSynthesis.getVoices() || [];
      const en = list.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
      setVoices(en.length ? en : list);
    };
    load();
    window.speechSynthesis.addEventListener('voiceschanged', load);
    return () => window.speechSynthesis.removeEventListener('voiceschanged', load);
  }, [ttsAvailable]);

  // Cancel speech when leaving Practice/Flashcards tab or unmounting
  useEffect(() => {
    return () => { if (ttsAvailable) window.speechSynthesis.cancel(); };
  }, [ttsAvailable]);
  useEffect(() => {
    if (ttsAvailable && activeTab !== 'practice' && activeTab !== 'flashcards') {
      window.speechSynthesis.cancel();
      setSpeakingId(null);
    }
  }, [activeTab, ttsAvailable]);

  const stopSpeak = () => {
    if (!ttsAvailable) return;
    window.speechSynthesis.cancel();
    setSpeakingId(null);
  };

  const speak = (text, id = 'default') => {
    if (!ttsAvailable || !ttsEnabled || !text) return;
    const synth = window.speechSynthesis;
    // Click while playing same source = stop
    if (speakingId === id && synth.speaking) { stopSpeak(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = ttsRate;
    if (ttsVoiceURI) {
      const v = voices.find(v => v.voiceURI === ttsVoiceURI);
      if (v) u.voice = v;
    }
    u.onstart = () => setSpeakingId(id);
    u.onend   = () => setSpeakingId(prev => (prev === id ? null : prev));
    u.onerror = () => setSpeakingId(prev => (prev === id ? null : prev));
    setSpeakingId(id);
    synth.speak(u);
  };

  // Compose options speech for practice ("Option A: ... Option B: ...")
  const composeOptionsText = (q) => q ? q.options.map((o, i) => `Option ${String.fromCharCode(65 + i)}. ${o}`).join('. ') : '';

  // Inline SpeakButton (has access to closure)
  const SpeakButton = ({ text, id, label, size = 'sm' }) => {
    if (!ttsAvailable || !ttsEnabled || !text) return null;
    const isPlaying = speakingId === id;
    const cls = size === 'lg'
      ? 'text-xs px-3 py-1.5'
      : 'text-[11px] px-2 py-1';
    return (
      <button onClick={(e) => { e.stopPropagation(); speak(text, id); }}
        className={`inline-flex items-center gap-1 rounded-sm border transition font-body ${cls} ${isPlaying ? 'bg-sky-100 border-sky-600 text-sky-900' : 'border-stone-400 text-stone-600 hover:bg-stone-200 bg-white/70'}`}
        title={isPlaying ? 'Stop playback' : 'Listen'}>
        <Icon name={isPlaying ? 'Pause' : 'Volume2'} size={11} fill={isPlaying ? 'currentColor' : 'none'} />
        {label || (isPlaying ? 'Stop' : 'Listen')}
      </button>
    );
  };

  // ============ DOMAINS CONTENT (DEEP) ============
  const domains = {
    domain1: {
      title: 'Human Development, Diversity, and Behavior in the Environment',
      short: 'Domain 1', color: '#5C7A6B', iconName: 'Users', pct: '~27%',
      summary: 'Theories of human development across the lifespan; impact of culture, identity, oppression, and environment on behavior; abuse/neglect dynamics; family/group/community/organizational systems.',
      sections: [
        { heading: 'Developmental Theories', content: [
          { name: "Erikson's Psychosocial Stages", body: "Eight stages, each with a central conflict. (1) Trust vs Mistrust [0-1] — hope; (2) Autonomy vs Shame/Doubt [1-3] — will; (3) Initiative vs Guilt [3-6] — purpose; (4) Industry vs Inferiority [6-12] — competence; (5) Identity vs Role Confusion [12-18] — fidelity; (6) Intimacy vs Isolation [young adult] — love; (7) Generativity vs Stagnation [middle adult] — care; (8) Integrity vs Despair [late adult] — wisdom." },
          { name: "Piaget's Cognitive Stages", body: "(1) Sensorimotor [0-2] — object permanence; (2) Preoperational [2-7] — symbolic thought, egocentrism, no conservation; (3) Concrete Operational [7-11] — logic for concrete events, reversibility, conservation; (4) Formal Operational [11+] — abstract and hypothetical reasoning." },
          { name: "Kohlberg's Moral Development", body: 'Preconventional (obedience and self-interest), Conventional (social approval, law and order), Postconventional (social contract, universal ethics). Gilligan critiqued Kohlberg for male-centric framing and proposed an ethic of care for women.' },
          { name: "Bowlby & Ainsworth — Attachment", body: "Bowlby: attachment is a biologically based bond. Ainsworth Strange Situation styles: Secure, Insecure-Avoidant, Insecure-Ambivalent/Resistant, and Disorganized (often trauma-related). Adult attachment styles mirror these and affect therapeutic relationship." },
          { name: "Maslow's Hierarchy", body: "Physiological → Safety → Belonging → Esteem → Self-Actualization (later transcendence added). Assess and address basic needs FIRST. ASWB-style: a client who is unhoused cannot meaningfully engage in insight-oriented therapy." },
          { name: 'Vygotsky — Sociocultural Theory', body: "Cognitive development is socially mediated. Zone of Proximal Development (ZPD): gap between what a learner can do alone vs with guidance. Scaffolding: supportive structure that fades as competence grows. Language is central to thought." },
          { name: 'Bandura — Social Learning Theory', body: "Learning through observation, modeling, imitation, and vicarious reinforcement. Self-efficacy belief drives behavior. Bobo doll studies showed children imitate aggression they observe. Foundational for skills training, modeling interventions, parent training." },
          { name: 'Lifespan Milestones', body: "Infants: motor and sensory development, object permanence by 8-12 months. Toddlers: parallel play. Preschool: cooperative play, magical thinking. School-age: peer relationships, concrete logic. Adolescence: identity formation, abstract thought, risk-taking due to incomplete prefrontal development (matures around 25). Older adults: integrity, generativity, grief and loss." },
        ] },
        { heading: 'Family, Group, Community & Organizational Systems', content: [
          { name: 'Systems Theory', body: 'Bertalanffy. Systems have inputs, throughputs, outputs, feedback loops, and seek homeostasis. Change in one part affects all parts. Subsystems and suprasystems. The social worker assesses the person AND the system.' },
          { name: 'Ecological Perspective', body: "Bronfenbrenner: Microsystem (family, school), Mesosystem (interactions between microsystems), Exosystem (parent's workplace), Macrosystem (culture, policy), Chronosystem (changes over time). The person-in-environment lens." },
          { name: 'Family Systems Concepts', body: 'Homeostasis — family resists change. Triangulation — third party drawn into dyad conflict. Enmeshment vs Disengagement — diffuse vs rigid boundaries. Scapegoating. Identified Patient (IP) — symptoms in one member reflect system dysfunction. Multigenerational transmission (Bowen).' },
          { name: 'Family Lifecycle Stages (Carter & McGoldrick)', body: 'Leaving home, joining through marriage/union, families with young children, with adolescents, launching, later life. Each transition is a potential crisis point.' },
          { name: 'Group Dynamics — Tuckman', body: 'Forming (cautious, leader-dependent) → Storming (conflict, power struggles) → Norming (cohesion, trust) → Performing (productive work) → Adjourning (termination, grief). Social worker role shifts from directive to facilitative to grief-guiding.' },
          { name: 'Group Types', body: 'Task, psychoeducational, support, therapy, self-help. Open vs closed groups. Homogeneous vs heterogeneous composition. Curative factors (Yalom): universality, instillation of hope, altruism, catharsis, group cohesiveness.' },
          { name: 'Community Organization Models (Rothman)', body: 'Locality development (consensus-based community building), Social planning (expert-driven problem solving), Social action (conflict, advocacy, redistribution of power).' },
          { name: 'Genograms & Ecomaps', body: "Genogram: multigenerational family diagram (3+ generations) showing relationships, patterns, key events. Ecomap: visual map of the client's connections to systems (work, school, religion, supports, stressors). Use early in assessment to surface patterns." },
        ] },
        { heading: 'Diversity, Identity & Oppression', content: [
          { name: 'Cultural Humility (preferred 2026 framing)', body: "Lifelong process of self-reflection and learning. Recognize power imbalances. Be a learner, not an expert on the client's culture. Contrast with cultural competence which implies mastery." },
          { name: 'Intersectionality (Crenshaw)', body: 'Multiple identities (race, gender, sexuality, class, disability, immigration status) intersect and create compounded experiences of privilege and oppression. Do not consider one identity in isolation.' },
          { name: 'Acculturation Models', body: "Berry's four strategies based on retention of heritage culture and adoption of host culture: Integration (both), Assimilation (host only), Separation (heritage only), Marginalization (neither). Integration is associated with best mental health outcomes." },
          { name: 'Racial Identity Development', body: 'Cross (Black identity): Pre-encounter → Encounter → Immersion-Emersion → Internalization → Internalization-Commitment. Helms (White identity): Contact → Disintegration → Reintegration → Pseudo-Independence → Immersion-Emersion → Autonomy.' },
          { name: 'Microaggressions (Sue)', body: 'Brief, often unintentional verbal/behavioral indignities that communicate hostile or negative messages to marginalized groups. Three forms: microassaults (overt), microinsults (rude/insensitive), microinvalidations (negate experiences). Cumulative harm.' },
          { name: 'LGBTQIA+ Considerations', body: 'Coming out as a developmental process. Minority stress model — chronic stress from prejudice and stigma drives health disparities. Affirmative practice. Avoid heteronormative assumptions. Know that conversion therapy is unethical.' },
          { name: 'Disability Models', body: 'Medical model (deficit-based) vs Social model (environment disables). Use person-first ("person with autism") OR identity-first ("autistic person") language per individual preference.' },
          { name: 'Religion and Spirituality', body: 'Distinct constructs. Spirituality may be a protective factor or source of distress. Assess without imposing. Be aware of religious abuse and spiritual bypass.' },
        ] },
        { heading: 'Abuse, Neglect & Trauma', content: [
          { name: 'Types of Abuse', body: 'Physical, sexual, emotional/psychological, neglect (physical, emotional, educational, medical), financial/economic exploitation. Can affect children, adults, intimate partners, elders, and people with disabilities.' },
          { name: 'Indicators of Child Abuse', body: 'Physical: unexplained injuries, patterned bruises, delays in seeking care. Sexual: age-inappropriate sexual knowledge, regression, somatic complaints. Emotional: extremes of behavior, attachment problems. Neglect: poor hygiene, unmet medical needs, developmental delays.' },
          { name: 'Intimate Partner Violence', body: 'Power and control wheel (Duluth model). Cycle of violence: tension building → acute battering → reconciliation/honeymoon. Highest risk is at separation. Never leave couples counseling as the primary intervention when IPV is active.' },
          { name: 'Elder Abuse', body: 'Physical, emotional, sexual, financial, neglect, self-neglect. Risk factors: cognitive impairment, social isolation, caregiver burden. In Kansas, mandated report to APS (1-800-922-5330).' },
          { name: 'Trauma Responses', body: 'Acute Stress Disorder (3 days to 1 month). PTSD (>1 month). Complex PTSD (chronic, interpersonal trauma, affects identity and relationships). Trauma-informed care principles: safety, trust, peer support, collaboration, empowerment, cultural/historical/gender awareness (SAMHSA).' },
          { name: 'ACEs (Adverse Childhood Experiences)', body: 'Original 10-item study by Felitti & Anda showed dose-response: more ACEs → worse adult health outcomes (physical, mental, behavioral). Includes abuse, neglect, and household dysfunction.' },
          { name: 'Polyvagal Theory (Porges)', body: 'Three branches of autonomic response: ventral vagal (social engagement, safety), sympathetic (fight/flight), dorsal vagal (freeze/shutdown). Helps explain trauma responses and informs trauma-sensitive interventions emphasizing safety cues.' },
        ] },
        { heading: 'Substance Use, Sexuality & Aging', content: [
          { name: 'Substance Use Concepts', body: 'DSM-5-TR Substance Use Disorder uses 11 criteria across impaired control, social impairment, risky use, pharmacological (tolerance, withdrawal). Mild (2-3), Moderate (4-5), Severe (6+). Differentiate use, misuse, abuse, dependence.' },
          { name: 'Stages of Change (Prochaska)', body: 'Precontemplation → Contemplation → Preparation → Action → Maintenance → (Relapse). Relapse is part of recovery, not failure. Match intervention to stage.' },
          { name: 'Withdrawal Risks', body: 'Alcohol and benzodiazepine withdrawal can be FATAL — medical detox required. Opioid withdrawal is painful but not typically life-threatening (except in pregnancy or severe medical comorbidity). Stimulant withdrawal — depressive, suicidality risk.' },
          { name: 'Harm Reduction', body: 'Pragmatic approach: meet clients where they are, reduce risks even when abstinence is not the goal. Examples: needle exchange, naloxone distribution, MAT (methadone, buprenorphine), safer-use education. Evidence-based, NASW-endorsed.' },
          { name: 'Human Sexuality', body: 'Distinguish sex (biological), gender identity (internal sense), gender expression (presentation), and sexual orientation (attraction). Sexual response cycle (Masters & Johnson): excitement, plateau, orgasm, resolution. Sexual dysfunction assessment is part of biopsychosocial.' },
          { name: 'Aging & Late Life', body: 'Normal aging: slower processing, some memory changes, but NOT major cognitive impairment. Dementia is not normal aging. Loss of independence, grief, isolation are common. Suicide risk in older white men is the highest demographic risk in the US.' },
          { name: 'Grief and Loss', body: "Kübler-Ross: denial, anger, bargaining, depression, acceptance — not strictly sequential. Worden's four tasks: accept reality, process pain, adjust to environment, find enduring connection while moving forward. Complicated/Prolonged Grief Disorder (DSM-5-TR) when grief persists beyond expected." },
        ] },
      ],
    },
    domain2: {
      title: 'Assessment and Intervention Planning',
      short: 'Domain 2', color: '#4A5A7A', iconName: 'Layers', pct: '~24%',
      summary: 'Biopsychosocial assessment, DSM-5-TR diagnosis, mental status exam, risk assessment, collateral data, treatment planning with measurable goals.',
      sections: [
        { heading: 'Biopsychosocial-Spiritual Assessment', content: [
          { name: 'Bio Domain', body: 'Medical history, current conditions, medications and adherence, allergies, pain, sleep, nutrition, exercise, substance use (alcohol, tobacco, drugs), family medical history, sexual health, neurological symptoms.' },
          { name: 'Psycho Domain', body: 'Presenting problem, mental health history, prior diagnoses and treatments, hospitalizations, mental status, mood, affect, anxiety, psychosis symptoms, suicidality/homicidality, trauma history, coping skills, strengths.' },
          { name: 'Social Domain', body: 'Family structure and dynamics, intimate relationships, social supports, employment/education, housing, finances, legal involvement, military service, recreation, religion/spirituality, culture, immigration status.' },
          { name: 'Why "First"', body: 'When a vignette asks what you should do FIRST with a new client, the answer is almost always to conduct a comprehensive biopsychosocial assessment before any intervention. You cannot intervene without understanding the whole person and context.' },
        ] },
        { heading: 'Mental Status Exam', content: [
          { name: 'Appearance', body: 'Grooming, hygiene, dress appropriate for weather/setting, weight, posture, eye contact, attitude (cooperative, hostile, guarded, seductive).' },
          { name: 'Behavior & Psychomotor', body: 'Activity level (agitation, retardation), tics, tremors, mannerisms, gait.' },
          { name: 'Speech', body: 'Rate (pressured, slow), volume, fluency, articulation, latency of response, prosody.' },
          { name: 'Mood & Affect', body: 'Mood = subjective ("How are you feeling?"). Affect = observed: range (full, restricted, blunted, flat), intensity, congruence with mood/content, lability.' },
          { name: 'Thought Process', body: "Linear, circumstantial (excess detail but reaches point), tangential (off track, doesn't return), loose associations, flight of ideas, thought blocking, perseveration, word salad." },
          { name: 'Thought Content', body: 'Suicidal/homicidal ideation, obsessions, delusions (paranoid, grandiose, somatic, religious, of reference, of control), phobias, preoccupations.' },
          { name: 'Perception', body: 'Hallucinations (auditory, visual, tactile, olfactory, gustatory), illusions, depersonalization, derealization.' },
          { name: 'Cognition', body: 'Orientation (person, place, time, situation), attention/concentration (serial 7s, spell WORLD backward), memory (immediate, recent, remote), abstract reasoning (proverbs, similarities), fund of knowledge.' },
          { name: 'Insight & Judgment', body: 'Insight = awareness of illness/problem. Judgment = capacity to make sound decisions (often assessed via hypothetical scenarios).' },
        ] },
        { heading: 'DSM-5-TR Key Diagnostic Categories', content: [
          { name: 'Depressive Disorders', body: 'MDD: 5+ symptoms incl. depressed mood or anhedonia, ≥2 weeks. Persistent Depressive Disorder (dysthymia): depressed mood most days for ≥2 years. Premenstrual Dysphoric Disorder. Disruptive Mood Dysregulation Disorder (children).' },
          { name: 'Bipolar & Related', body: 'Bipolar I: at least one manic episode (7+ days OR hospitalization). Bipolar II: hypomanic + major depressive episode. Cyclothymia: chronic mood instability ≥2 years not meeting full criteria.' },
          { name: 'Anxiety Disorders', body: 'Generalized Anxiety (≥6 months), Panic Disorder, Specific Phobia, Social Anxiety, Agoraphobia, Separation Anxiety, Selective Mutism.' },
          { name: 'OCD & Related', body: 'OCD (obsessions + compulsions), Body Dysmorphic Disorder, Hoarding Disorder, Trichotillomania, Excoriation.' },
          { name: 'Trauma & Stressor-Related', body: 'PTSD (>1 month, intrusion + avoidance + negative mood/cognition + arousal). Acute Stress Disorder (3 days-1 month). Adjustment Disorders. Reactive Attachment Disorder. Disinhibited Social Engagement Disorder. Prolonged Grief Disorder (new in DSM-5-TR).' },
          { name: 'Dissociative Disorders', body: 'Dissociative Identity Disorder, Dissociative Amnesia, Depersonalization/Derealization Disorder.' },
          { name: 'Schizophrenia Spectrum', body: 'Schizophrenia (≥6 months total, ≥1 month active symptoms — delusions, hallucinations, disorganized speech, grossly disorganized behavior, negative symptoms). Schizoaffective, Schizophreniform (1-6 months), Brief Psychotic Disorder (<1 month), Delusional Disorder.' },
          { name: 'Neurodevelopmental', body: 'Autism Spectrum Disorder, ADHD (inattentive, hyperactive-impulsive, combined), Intellectual Disability, Specific Learning Disorder, Communication Disorders, Motor Disorders.' },
          { name: 'Personality Disorders (clusters)', body: 'Cluster A (odd/eccentric): Paranoid, Schizoid, Schizotypal. Cluster B (dramatic/erratic): Antisocial, Borderline, Histrionic, Narcissistic. Cluster C (anxious/fearful): Avoidant, Dependent, Obsessive-Compulsive.' },
          { name: 'Substance-Related', body: 'Substance Use Disorders (11 criteria, severity by count). Substance-Induced disorders (intoxication, withdrawal, induced mental disorders). Gambling Disorder is the only behavioral addiction in DSM-5-TR.' },
          { name: 'Eating Disorders', body: 'Anorexia (restricting or binge-purge), Bulimia, Binge-Eating Disorder, ARFID, Pica, Rumination.' },
          { name: 'Neurocognitive Disorders', body: 'Delirium (acute, fluctuating, reversible, often medical) vs Major/Mild Neurocognitive Disorder (chronic, progressive, e.g., Alzheimer’s, vascular, Lewy body, frontotemporal). Differentiate from depression (pseudo-dementia) in older adults.' },
          { name: 'New in DSM-5-TR (2022)', body: 'Prolonged Grief Disorder. Suicidal Behavior and Nonsuicidal Self-Injury given codes for further study. Unspecified Mood Disorder returned. Updated cultural concepts of distress section.' },
        ] },
        { heading: 'Risk Assessment', content: [
          { name: 'Suicide Risk', body: 'Assess: ideation (frequency, intensity, duration), plan (specific, lethal, available), intent, means access, prior attempts (strongest predictor), recent losses/triggers, protective factors (reasons for living, supports, treatment engagement). Tools: Columbia Suicide Severity Rating Scale (C-SSRS), SAD PERSONS.' },
          { name: 'Homicide/Violence Risk', body: 'History of violence (best predictor), substance use, psychosis with command hallucinations, antisocial features, access to weapons, identified target. Duty to warn/protect (Tarasoff) when identifiable victim and credible threat.' },
          { name: 'Self-Harm vs Suicide', body: 'Non-suicidal self-injury (NSSI) often functions as emotion regulation, not intent to die. Still assess for suicidal ideation. NSSI is a risk factor for future suicidal behavior.' },
          { name: 'Safety Planning', body: 'Stanley-Brown Safety Plan: (1) warning signs, (2) internal coping, (3) social contacts for distraction, (4) people to ask for help, (5) professionals/agencies, (6) means restriction. Collaborative — not a "no-suicide contract" (those are NOT evidence-based).' },
          { name: 'Screening Tools', body: 'PHQ-9 (depression), GAD-7 (anxiety), PCL-5 (PTSD), AUDIT / CAGE / MAST (alcohol), CRAFFT (adolescent substance), MoCA / MMSE (cognition), C-SSRS (suicide). Brief, validated, repeatable to track change over time.' },
        ] },
        { heading: 'Treatment Planning', content: [
          { name: 'SMART Goals', body: 'Specific, Measurable, Achievable, Relevant, Time-bound. "Client will reduce panic attack frequency from 4/week to 1/week within 8 weeks" — not "Client will feel better."' },
          { name: 'Goal Hierarchy', body: 'Address safety first, then symptom stabilization, then functional improvement, then growth-oriented goals. Be sequenced and realistic.' },
          { name: 'Collaborative Planning', body: 'Goals must come from the client. Even when the social worker sees other priorities, engagement requires honoring what the client wants to work on (unless safety overrides).' },
          { name: 'Documentation', body: 'Use SOAP (Subjective, Objective, Assessment, Plan), DAP (Data, Assessment, Plan), or BIRP (Behavior, Intervention, Response, Plan). Document what is clinically relevant. Avoid speculation, jargon, and bias.' },
          { name: 'Collateral Data', body: "With consent, gather from family, prior providers, schools, medical records, court records. Verify, don't replace, client self-report. Be transparent about who you contacted and why." },
        ] },
      ],
    },
    domain3: {
      title: 'Interventions with Client Systems',
      short: 'Domain 3', color: '#8B6F47', iconName: 'Heart', pct: '~24%',
      summary: 'Evidence-based therapeutic modalities; individual, family, group, community interventions; crisis intervention; case management; advocacy; supervision; evaluation of outcomes.',
      sections: [
        { heading: 'Therapeutic Modalities (Individual)', content: [
          { name: 'Cognitive Behavioral Therapy (CBT)', body: 'Core premise: thoughts → feelings → behaviors. Identify and modify cognitive distortions (all-or-nothing, catastrophizing, mind-reading, personalization). Techniques: thought records, behavioral experiments, behavioral activation, exposure. Strong evidence for depression, anxiety, PTSD, OCD.' },
          { name: 'Dialectical Behavior Therapy (DBT)', body: 'Developed by Marsha Linehan for borderline personality. Four skill modules: mindfulness, distress tolerance, emotion regulation, interpersonal effectiveness. Combines acceptance and change. Evidence for BPD, self-harm, suicidality, eating disorders.' },
          { name: 'Motivational Interviewing (MI)', body: 'OARS: Open-ended questions, Affirmations, Reflective listening, Summaries. Express empathy, develop discrepancy, roll with resistance, support self-efficacy. Honors ambivalence. Strongest evidence for substance use but applicable widely.' },
          { name: 'Solution-Focused Brief Therapy (SFBT)', body: 'Miracle question, scaling questions, exception-finding, focus on strengths and resources. Brief (5-10 sessions). Client is expert on their life. Looks forward, not backward.' },
          { name: 'Narrative Therapy', body: 'Externalize the problem ("the depression" not "your depression"). Identify unique outcomes that contradict the problem-saturated story. Re-author the client\'s narrative. Developed by White & Epston.' },
          { name: 'Psychodynamic Therapy', body: 'Roots in Freudian theory but modernized. Insight into unconscious patterns, transference, defenses. Longer-term. Good for personality issues, persistent relational problems.' },
          { name: 'Person-Centered (Rogers)', body: 'Three core conditions: unconditional positive regard, empathy, congruence. The relationship itself is healing. Foundation for all good clinical work, even when other modalities are layered on.' },
          { name: 'Acceptance and Commitment Therapy (ACT)', body: 'Third-wave behavioral therapy. Six processes: acceptance, cognitive defusion, present-moment awareness, self-as-context, values, committed action. Goal: psychological flexibility, not symptom reduction per se. Evidence across many conditions.' },
          { name: 'Trauma-Focused CBT (TF-CBT)', body: 'Evidence-based for child trauma. Phases: psychoeducation, parenting skills, relaxation, affective expression, cognitive coping, trauma narrative, in-vivo exposure, conjoint sessions, enhancing safety.' },
          { name: 'EMDR', body: 'Eye Movement Desensitization and Reprocessing. Bilateral stimulation while recalling trauma. Eight phases. Evidence-based for PTSD. Requires specific training.' },
          { name: 'Exposure Therapies', body: 'Systematic desensitization (Wolpe): graduated exposure paired with relaxation. In vivo (real situation), imaginal (in mind), interoceptive (body sensations). Flooding: prolonged high-intensity exposure (less commonly used). Foundational for anxiety, phobias, PTSD.' },
          { name: 'Behavioral Approaches', body: "Operant conditioning (Skinner): reinforcement (positive/negative) increases behavior; punishment decreases it. Schedules of reinforcement (fixed/variable, ratio/interval). Token economies, contingency contracts, premack principle ('first eat veggies, then dessert'). Behavioral activation for depression." },
        ] },
        { heading: 'Family & Couples Interventions', content: [
          { name: 'Structural Family Therapy (Minuchin)', body: 'Map family structure (subsystems, boundaries, hierarchy). Joining, enactment, restructuring. Goals: clear boundaries, appropriate hierarchy (parents in charge), differentiated subsystems.' },
          { name: 'Strategic Family Therapy (Haley, Madanes)', body: 'Therapist takes active role designing strategies. Directives, paradoxical interventions, reframing. Symptom serves a function in the system; change the function.' },
          { name: 'Bowen Family Systems', body: 'Differentiation of self (ability to maintain individuality within emotional system). Genogram (3+ generations). Multigenerational transmission. Triangles. Emotional cutoff.' },
          { name: 'Emotionally Focused Therapy (EFT) for couples', body: 'Sue Johnson. Attachment-based. Three stages: de-escalate negative cycle, restructure interactions, consolidation. Strong evidence base.' },
          { name: 'Caution: IPV', body: 'Couples therapy is contraindicated when intimate partner violence is active. Separate intervention needed for safety. Never put a victim in joint sessions with their abuser.' },
        ] },
        { heading: 'Group Interventions', content: [
          { name: 'Group Composition', body: 'Homogeneous (similar issue) builds quick cohesion. Heterogeneous (mixed) builds broader perspective. Open groups have rolling membership; closed groups start and end together.' },
          { name: 'Group Curative Factors (Yalom)', body: 'Universality, instillation of hope, imparting information, altruism, corrective recapitulation of family, socializing techniques, imitative behavior, interpersonal learning, group cohesiveness, catharsis, existential factors.' },
          { name: 'Co-Leadership', body: 'Benefits: modeling, broader perspective, support during difficult moments, training. Risks: split leadership, undermining, parallel process. Requires regular co-leader meetings outside group.' },
          { name: 'Pre-Group Screening', body: 'Screen for fit. Exclude those in acute crisis, those whose behavior would derail (active psychosis, severe antisocial), or those whose needs cannot be met in group format. Group is not appropriate for everyone.' },
        ] },
        { heading: 'Crisis Intervention', content: [
          { name: "Roberts' 7-Stage Model", body: '(1) Plan and conduct crisis and biopsychosocial assessment including lethality; (2) Establish rapport; (3) Identify major problems; (4) Deal with feelings and emotions; (5) Generate alternatives; (6) Develop an action plan; (7) Follow-up.' },
          { name: 'Crisis vs Emergency', body: 'Crisis = subjective distress overwhelming usual coping. Emergency = imminent risk requiring immediate protective action. Crisis intervention is short-term and present-focused, not therapy.' },
          { name: 'Psychological First Aid (PFA)', body: 'Used in disasters and mass trauma. Eight core actions: contact and engagement, safety and comfort, stabilization, information gathering, practical assistance, connection with social supports, information on coping, linkage with collaborative services.' },
          { name: 'Debriefing Caution', body: 'Critical Incident Stress Debriefing (CISD) was once standard but evidence shows it may INCREASE PTSD risk in some populations. PFA is now preferred immediately post-trauma.' },
        ] },
        { heading: 'Case Management, Advocacy & Macro Practice', content: [
          { name: 'Case Management Functions', body: 'Engagement, assessment, planning, linking, monitoring, advocacy, evaluation. Strengths-based and client-driven. Bridge between client and systems.' },
          { name: 'Advocacy Levels', body: "Case (individual client) advocacy and Cause (systemic, policy) advocacy. NASW Code requires both. Use case-level patterns to inform cause-level work." },
          { name: 'Community Organizing', body: 'Rothman models: Locality Development (consensus, community building), Social Planning (expert problem-solving), Social Action (conflict, power redistribution). Saul Alinsky tradition emphasizes power analysis and grassroots organizing.' },
          { name: 'Program Evaluation', body: 'Formative (during, improve program) vs Summative (after, judge outcomes). Outcome (changes in clients) vs Process (how the program runs). Logic models map inputs → activities → outputs → outcomes → impact.' },
          { name: 'Single-Subject Design', body: 'A-B (baseline, intervention), A-B-A (return to baseline), A-B-A-B (reintroduce). Demonstrates intervention effect with individual clients. Foundational research design in social work practice.' },
        ] },
        { heading: 'Termination & Outcome Evaluation', content: [
          { name: 'Termination Tasks', body: 'Review goals and progress, process feelings (loss, pride, anxiety), consolidate gains, plan for relapse and warning signs, provide referrals, leave the door open. Give adequate notice — abrupt termination is unethical.' },
          { name: 'Reasons for Termination', body: 'Goals met, client no longer benefits, client withdraws, lack of progress with clear reasons, financial or insurance limits, social worker departure, ethical conflicts, client harm to worker. Document reasoning.' },
          { name: 'Evaluation of Practice', body: 'Use standardized measures (PHQ-9 for depression, GAD-7 for anxiety, PCL-5 for PTSD, AUDIT for alcohol). Routinely re-administer to track progress. Outcome data informs treatment decisions.' },
          { name: 'Supervision', body: 'Educational, supportive, administrative functions. For LMSWs in Kansas, clinical work requires BSRB-approved supervision toward LSCSW. Document. Use supervision actively — do not present only successes.' },
        ] },
      ],
    },
    domain4: {
      title: 'Professional Relationships, Values, and Ethics',
      short: 'Domain 4', color: '#a05050', iconName: 'Compass', pct: '~25%',
      summary: 'NASW Code of Ethics, confidentiality, informed consent, dual relationships, professional development, documentation, technology in practice, supervisor/colleague relationships, legal obligations.',
      sections: [
        { heading: 'NASW Code of Ethics — Six Core Values', content: [
          { name: 'Service', body: 'Help people in need and address social problems. Elevate service above self-interest. Volunteer some portion of professional skills (pro bono).' },
          { name: 'Social Justice', body: 'Challenge injustice. Pursue change with and on behalf of vulnerable populations. Address poverty, unemployment, discrimination.' },
          { name: 'Dignity and Worth of the Person', body: 'Respect inherent dignity and worth. Promote self-determination. Be culturally and ethnically sensitive. Seek to enhance capacity for change.' },
          { name: 'Importance of Human Relationships', body: 'Relationships are vehicles of change. Engage people as partners. Strengthen relationships among people to promote, restore, and enhance well-being.' },
          { name: 'Integrity', body: 'Act trustworthy. Be aware of mission, values, ethical standards. Act honestly and responsibly. Maintain ethical practice on behalf of the organizations you represent.' },
          { name: 'Competence', body: 'Practice within scope. Expand professional knowledge and skills. Contribute to the knowledge base. Continue education throughout career.' },
        ] },
        { heading: 'Confidentiality & Privacy', content: [
          { name: 'General Rule', body: 'Confidentiality is a foundational obligation. Disclose only with informed consent or when compelled by law. Discuss limits at the outset and as they arise.' },
          { name: 'Mandatory Breaks', body: 'Imminent harm to self, imminent harm to identifiable others (Tarasoff), suspected child abuse/neglect (Kansas DCF), suspected vulnerable adult abuse (Kansas APS), court orders/subpoenas, client written authorization, mandated audits.' },
          { name: 'Minor Clients', body: 'Generally parents/guardians hold privilege but minors have some privacy rights, especially around sensitive topics. Discuss limits with both. Some Kansas-specific rules apply to mental health, substance use, and reproductive health for minors.' },
          { name: 'HIPAA Basics', body: 'Privacy Rule, Security Rule, Breach Notification. Use and disclose protected health information (PHI) only with authorization or for treatment, payment, healthcare operations (TPO). Minimum necessary standard.' },
          { name: 'Group/Family Confidentiality', body: 'In groups, the worker can promise their own confidentiality but cannot guarantee other members will keep it. Make this explicit. In family work, clarify what is shared and not shared between sessions.' },
          { name: 'Technology', body: "Encrypted communications, secure platforms for telehealth, secure storage. Email and text are not inherently secure. Get specific consent for telehealth and electronic communication. Know your jurisdiction's rules for cross-state practice." },
          { name: 'Deceased Clients', body: 'Confidentiality survives death. Disclose only as legally permitted (executor, court order, public interest exceptions).' },
          { name: '42 CFR Part 2', body: 'Federal regulation protecting confidentiality of substance use treatment records. Stricter than HIPAA in many respects. Generally requires specific written consent for each disclosure. Know it exists.' },
        ] },
        { heading: 'Boundaries & Dual Relationships', content: [
          { name: 'Boundary Crossing vs Violation', body: 'Crossing: a deviation from typical practice that may be acceptable when documented, thoughtful, non-exploitative (e.g., attending a client\'s funeral, accepting a small token gift). Violation: harmful, exploitative, or undermines treatment (sexual contact, business deals, accepting major gifts).' },
          { name: 'Sexual Contact', body: 'NEVER with a current client. NEVER with former clients in most circumstances — the NASW Code generally prohibits this without time limit when there is potential for harm. Never with a client\'s relative or close associate when the dynamic could exploit the therapeutic relationship.' },
          { name: 'Dual Relationships', body: 'Multiple roles with the same client (worker + friend, worker + business partner, worker + neighbor). Avoid when avoidable. When unavoidable (small communities, religious groups), set clear boundaries, document, and consult.' },
          { name: 'Self-Disclosure', body: 'Use sparingly and for client benefit. Ask: does this serve the client or me? Personal information is rarely needed and can shift the dynamic.' },
          { name: 'Gifts', body: 'Small symbolic gifts may be accepted with cultural sensitivity. Larger or repeated gifts should be declined and explored. Never accept anything that creates obligation.' },
        ] },
        { heading: 'Informed Consent', content: [
          { name: 'Required Elements', body: 'Nature of services, risks and benefits, alternatives, limits of confidentiality, fees, right to refuse and withdraw, who will provide and supervise, anticipated time frame, how to file a complaint.' },
          { name: 'Capacity to Consent', body: 'Adult competent clients consent for themselves. For minors, parents/guardians generally consent (with exceptions). For adults lacking capacity, legally authorized representatives. Assent should be sought from minors and adults with diminished capacity.' },
          { name: 'Ongoing Process', body: 'Not a one-time signature. Reaffirm consent when treatment direction changes, when new risks emerge, when reaching new milestones.' },
          { name: 'Language and Literacy', body: 'Provide consent in language client understands. Use interpreters when needed (qualified, not family members). Check comprehension — do not just hand a form.' },
        ] },
        { heading: 'Professional Development & Self-Care', content: [
          { name: 'Scope of Competence', body: 'Practice only within areas of education, training, certification, supervised experience. Pursue training before adding new populations or modalities.' },
          { name: 'Supervision and Consultation', body: 'Use consultation when uncertain. For LMSWs in Kansas, supervision is required for clinical work. Document supervision. Use it as a clinical and ethical resource, not just a paperwork requirement.' },
          { name: 'Self-Care', body: 'Ethical obligation, not optional. Burnout, compassion fatigue, and secondary traumatic stress can compromise care and constitute impairment. Monitor self. Take breaks. Use your own therapy when needed.' },
          { name: 'Impairment', body: 'A social worker whose practice is impaired by mental health, substance use, or life circumstances must seek help and not allow impairment to harm clients. Colleagues have an obligation to address impaired peers — usually starting with direct conversation.' },
          { name: 'Cultural and Linguistic Competence', body: 'Ongoing development. Use qualified interpreters when needed. Pursue training relevant to your client population. Recognize your own cultural lens and biases.' },
        ] },
        { heading: 'Colleague & Workplace Ethics', content: [
          { name: 'Respect for Colleagues', body: "Avoid disparagement. Address concerns directly first when feasible. Do not exploit a colleague's dispute for personal gain. Cooperate with other professionals in client’s interest." },
          { name: 'Reporting Unethical Conduct', body: 'Generally start by discussing with the colleague when feasible. If not resolved or unsafe to do so, report to supervisors, employers, and licensing boards. Some violations (sexual contact with client) require formal reporting.' },
          { name: 'Employer Obligations', body: 'Adhere to commitments to employers. Work to improve employer policies. Take reasonable steps to ensure employers know about the NASW Code. Do not engage in unfair labor practices.' },
          { name: 'Documentation', body: 'Records should be timely, accurate, sufficient. Protect privacy. Store securely. Retain per state law and agency policy (Kansas: generally 5+ years for adults, longer for minors).' },
          { name: 'Termination of Services', body: 'May terminate when goals are met, services no longer needed, or risk to worker. Provide reasonable notice, referrals, and continuity. Do not abandon. Address non-payment with discussion, not abrupt termination.' },
          { name: 'Billing and Fraud', body: 'Bill only for services delivered. Document accurately. Disclose fees up front. Never accept kickbacks for referrals. Bartering is generally discouraged but may be acceptable when not exploitative and culturally appropriate.' },
        ] },
        { heading: 'Ethical Decision-Making Process', content: [
          { name: 'Steps', body: '(1) Identify ethical issues and stakeholders. (2) Consult NASW Code, laws (Kansas BSRB regs, HIPAA, FERPA, state statutes), and agency policy. (3) Identify conflicting obligations and values. (4) Consult supervisor, colleagues, ethics committees. (5) Consider alternatives and consequences. (6) Decide, document, monitor, evaluate.' },
          { name: 'When Values Conflict', body: 'Common conflicts: self-determination vs safety, confidentiality vs mandated reporting, agency policy vs client need, personal values vs professional obligations. Document the reasoning, not just the decision.' },
          { name: 'Models', body: "Reamer's ethical decision-making framework. Dolgoff, Loewenberg & Harrington (ETHIC framework). Both emphasize systematic, transparent reasoning." },
          { name: 'Documentation of Ethical Decisions', body: 'Note the issue, the consultation, the options considered, the chosen action, and the rationale. Protects client, social worker, and supports learning.' },
        ] },
      ],

    { cat: 'Domain 1', front: 'Object permanence emerges at...', back: 'Around 8-12 months, during the sensorimotor stage. Child understands objects exist even when out of sight (related to peek-a-boo delight).' },
    { cat: 'Domain 1', front: 'Bronfenbrenner ecological levels', back: "Microsystem (immediate environment), Mesosystem (interactions between micros), Exosystem (indirect environment like parent's workplace), Macrosystem (culture, policy), Chronosystem (time)." },
    { cat: 'Domain 1', front: 'Disorganized attachment is associated with...', back: 'Frightening or unpredictable caregiving, often trauma or abuse. The child has no coherent strategy and may show contradictory behaviors. Higher risk for later psychopathology.' },
    { cat: 'Domain 1', front: 'Intersectionality (Crenshaw)', back: 'Overlapping social identities (race, gender, class, sexuality, disability, immigration) create unique experiences of oppression and privilege. Do not analyze one identity in isolation.' },
    { cat: 'Domain 1', front: "Berry's acculturation strategies", back: 'Integration (keep heritage + adopt new), Assimilation (drop heritage, adopt new), Separation (keep heritage only), Marginalization (neither). Integration linked to best mental health.' },
    { cat: 'Domain 1', front: 'Cross model of Black racial identity', back: 'Pre-encounter → Encounter → Immersion-Emersion → Internalization → Internalization-Commitment. Movement from internalized racism to integrated identity and commitment to community.' },
    { cat: 'Domain 1', front: 'Minority stress model', back: 'Chronic stressors faced by stigmatized groups (LGBTQ+, racial minorities) produce health disparities through both distal (overt discrimination) and proximal (internalized stigma, expectation of rejection) stressors.' },
    { cat: 'Domain 1', front: 'Cycle of intimate partner violence', back: 'Tension building → acute battering → reconciliation/honeymoon. Cycle tends to shorten and intensify over time. Highest danger point is at separation. Couples therapy is contraindicated when IPV is active.' },
    { cat: 'Domain 1', front: 'ACE study key finding', back: 'Felitti & Anda: dose-response relationship between adverse childhood experiences and adult physical, mental, behavioral health outcomes. 10 categories of abuse, neglect, and household dysfunction.' },
    { cat: 'Domain 1', front: 'Six SAMHSA trauma-informed care principles', back: '(1) Safety, (2) Trustworthiness & Transparency, (3) Peer Support, (4) Collaboration & Mutuality, (5) Empowerment, Voice & Choice, (6) Cultural, Historical & Gender Issues.' },
    { cat: 'Domain 1', front: 'Family triangulation', back: 'When tension between two family members draws in a third (often a child) to stabilize the dyad. Reduces direct conflict but creates dysfunction in the triangulated person.' },
    { cat: 'Domain 1', front: 'Identified Patient (IP)', back: 'The family member whose symptoms are the presenting complaint, but whose symptoms reflect dysfunction in the larger system. Treating only the IP misses the systemic issue.' },
    { cat: 'Domain 1', front: 'Kübler-Ross stages of grief', back: 'Denial, Anger, Bargaining, Depression, Acceptance. NOT strictly sequential or universal. Many people move between stages or skip stages.' },
    { cat: 'Domain 1', front: "Worden's four tasks of mourning", back: '(1) Accept the reality of the loss, (2) Process the pain of grief, (3) Adjust to a world without the deceased, (4) Find an enduring connection with the deceased while moving forward with life.' },
    // Domain 1 NEW
    { cat: 'Domain 1', front: 'Vygotsky’s Zone of Proximal Development (ZPD)', back: 'The gap between what a learner can do alone and what they can do with guidance. Effective teaching/therapy operates inside the ZPD with scaffolding that fades as competence grows.' },
    { cat: 'Domain 1', front: 'Bandura — social learning & self-efficacy', back: 'Learning occurs through observation, modeling, and vicarious reinforcement. Self-efficacy (belief in one’s capacity) predicts behavior change. Four sources: mastery experiences, vicarious experiences, verbal persuasion, physiological state.' },
    { cat: 'Domain 1', front: 'Major Freudian defense mechanisms', back: 'Denial, repression, projection, displacement, rationalization, reaction formation, regression, sublimation, intellectualization, splitting (BPD), identification with the aggressor. Common ASWB: tell projection from displacement from reaction formation.' },
    { cat: 'Domain 1', front: 'Locus of control (Rotter)', back: 'Internal: outcomes are due to one’s own behavior. External: outcomes are due to luck, fate, powerful others. Internal LOC generally linked to better mental health; external LOC may be adaptive in oppressive contexts.' },
    { cat: 'Domain 1', front: 'Cognitive dissonance (Festinger)', back: 'Discomfort from holding contradictory beliefs/behaviors, motivating attitude change. Underlies MI’s use of "developing discrepancy" between current behavior and stated values.' },
    { cat: 'Domain 1', front: 'Microaggressions — three forms (Sue)', back: 'Microassaults (overt, intentional slur), microinsults (rude/insensitive demean), microinvalidations (negate experiences of marginalized people). Cumulative harm even when individually small.' },
    { cat: 'Domain 1', front: 'Stereotype threat (Steele)', back: 'Fear of confirming a negative stereotype about one’s group can degrade performance on the very task being stereotyped. Documented across race, gender, age, SES. Implications for assessment fairness.' },
    { cat: 'Domain 1', front: 'Polyvagal theory — three states (Porges)', back: 'Ventral vagal (social engagement, safety), sympathetic (fight/flight), dorsal vagal (freeze/shutdown). Trauma can lock clients into defensive states; cues of safety help return to ventral vagal.' },
    { cat: 'Domain 1', front: 'Resilience — core protective factors', back: 'At least one stable, supportive caregiver; sense of self-efficacy; problem-solving skills; cultural/community connection; access to resources. Resilience is built, not innate.' },
    { cat: 'Domain 1', front: 'Carter & McGoldrick family lifecycle', back: 'Leaving home (young single adult) → joining (marriage/union) → families with young children → families with adolescents → launching children → families in later life. Each transition is a potential crisis point.' },
    { cat: 'Domain 1', front: 'Sibling position (Toman/Bowen)', back: 'Birth order shapes interpersonal style and choice of mate/colleagues. Bowen integrated this into family systems work — firstborns often more responsible/dominant, lastborns more relational/playful. Predictable patterns help mapping.' },
    { cat: 'Domain 1', front: 'Genogram vs ecomap', back: 'Genogram: multigenerational family diagram (3+ generations) of relationships and patterns. Ecomap: client’s connections to outside systems (work, school, supports, stressors) with strength/quality of each tie shown by line style.' },
    { cat: 'Domain 1', front: "Helms' White racial identity model", back: 'Contact → Disintegration → Reintegration → Pseudo-Independence → Immersion-Emersion → Autonomy. Movement from unawareness of racism through confrontation/discomfort toward antiracist commitment.' },
    { cat: 'Domain 1', front: 'Highest demographic suicide risk in U.S.', back: 'Older white men (especially 75+). Risk drivers: access to firearms, social isolation, untreated depression, recent loss of role/health/spouse. Screen actively in primary care and home visits.' },
    { cat: 'Domain 1', front: 'Disenfranchised grief (Doka)', back: 'Loss not openly acknowledged, socially mourned, or publicly supported (e.g., death of an ex-partner, miscarriage, loss of a pet, AIDS-related stigma death). Worker normalizes and creates ritual/meaning space.' },
    { cat: 'Domain 1', front: 'Refugee vs immigrant vs asylee', back: 'Refugee: granted status outside the U.S. due to persecution. Asylee: same definition but applies after entering U.S. Immigrant: broader term, may include voluntary migration. Trauma exposure and legal status drive very different needs.' },

    // DOMAIN 2
    { cat: 'Domain 2', front: 'Mental Status Exam components', back: 'Appearance, Behavior, Speech, Mood, Affect, Thought process, Thought content, Perception, Cognition (orientation, attention, memory), Insight, Judgment.' },
    { cat: 'Domain 2', front: 'Tangentiality vs Circumstantiality', back: 'Tangentiality: client veers off topic and does NOT return. Circumstantiality: excessive detail but EVENTUALLY reaches the point. Both are thought process disturbances.' },
    { cat: 'Domain 2', front: 'MDD diagnostic threshold', back: 'Five or more symptoms during the same 2-week period, including at least one of (depressed mood OR anhedonia). Symptoms cause significant distress/impairment. Not due to substance or medical condition.' },
    { cat: 'Domain 2', front: 'Manic episode duration', back: 'At least one week (or any duration if hospitalization is needed) of elevated/irritable mood AND increased activity/energy, plus 3+ symptoms (4 if mood is only irritable). Required for Bipolar I.' },
    { cat: 'Domain 2', front: 'PTSD vs Acute Stress Disorder', back: 'PTSD: symptoms persist >1 month after trauma exposure. ASD: 3 days to 1 month. Both require exposure to actual or threatened death, serious injury, or sexual violence plus symptom clusters.' },
    { cat: 'Domain 2', front: 'Schizophrenia core criteria', back: '≥2 of: delusions, hallucinations, disorganized speech, grossly disorganized/catatonic behavior, negative symptoms. At least one must be from the first three. Active for ≥1 month, total disturbance ≥6 months.' },
    { cat: 'Domain 2', front: 'Brief Psychotic vs Schizophreniform vs Schizophrenia', back: 'Brief Psychotic: <1 month. Schizophreniform: 1-6 months. Schizophrenia: ≥6 months total. All have psychotic symptoms; differ in duration.' },
    { cat: 'Domain 2', front: 'Borderline Personality core features', back: 'Pattern of instability in relationships, self-image, affect, and marked impulsivity by early adulthood. 5+ of: abandonment fears, unstable relationships, identity disturbance, impulsivity, self-harm/suicidality, affective instability, emptiness, anger, dissociation/paranoia.' },
    { cat: 'Domain 2', front: 'New in DSM-5-TR (2022)', back: 'Prolonged Grief Disorder added. Suicidal Behavior and Non-Suicidal Self-Injury given codes. Unspecified Mood Disorder returned. Updated cultural concepts of distress.' },
    { cat: 'Domain 2', front: 'Strongest predictor of suicide', back: 'Prior suicide attempt. Other strong predictors: family history, mental illness (esp. depression, bipolar, psychosis), substance use, recent loss, hopelessness, access to means, isolation.' },
    { cat: 'Domain 2', front: 'Suicide assessment essentials', back: 'Ideation (frequency/intensity), Plan (specific/lethal), Intent (commitment), Means (access), Timeframe, Prior attempts, Protective factors. Tools: Columbia (C-SSRS).' },
    { cat: 'Domain 2', front: 'Safety plan vs no-suicide contract', back: 'Safety plan (Stanley-Brown) is evidence-based: warning signs → coping → social distractions → social support → professionals → means restriction. No-suicide contracts are NOT evidence-based and should not be used.' },
    { cat: 'Domain 2', front: 'Tarasoff duty', back: 'Duty to warn/protect identifiable victims of a credible threat by a client. Originated in California; most US states have some version. May require breaking confidentiality.' },
    { cat: 'Domain 2', front: 'SMART goals', back: 'Specific, Measurable, Achievable, Relevant, Time-bound. "Client will attend 4 of 4 weekly therapy sessions over the next month" beats "Client will engage in treatment."' },
    { cat: 'Domain 2', front: 'SOAP notes', back: 'Subjective (client report), Objective (observation, data), Assessment (clinical impression), Plan (next steps). Standard documentation format. Other options: DAP, BIRP.' },
    { cat: 'Domain 2', front: 'Why "biopsychosocial assessment first"', back: 'You cannot intervene without understanding the whole person. Medical conditions can mimic mental illness (thyroid, B12 deficiency, medication side effects). Always rule out medical/substance causes.' },
    // Domain 2 NEW
    { cat: 'Domain 2', front: 'PHQ-9 score interpretation', back: 'Total 0-4 minimal; 5-9 mild; 10-14 moderate; 15-19 moderately severe; 20-27 severe. ≥10 commonly used as treatment threshold. Item 9 specifically screens suicidal ideation — follow up immediately if positive.' },
    { cat: 'Domain 2', front: 'GAD-7 score interpretation', back: '0-4 minimal; 5-9 mild; 10-14 moderate; 15-21 severe anxiety. ≥10 commonly used as treatment threshold. Quick, validated, repeatable measure for tracking change.' },
    { cat: 'Domain 2', front: 'C-SSRS purpose', back: 'Columbia Suicide Severity Rating Scale. Evidence-based structured assessment of ideation severity/intensity and behavior. Used across settings; categorizes ideation from wish-to-die to ideation-with-plan-and-intent.' },
    { cat: 'Domain 2', front: 'CAGE questionnaire', back: '4-item alcohol screen: Cut down? Annoyed by criticism? Guilty about drinking? Eye-opener? ≥2 positives = likely problem use. Brief, but less sensitive than AUDIT; use AUDIT when possible.' },
    { cat: 'Domain 2', front: 'AUDIT screening tool', back: '10-item Alcohol Use Disorders Identification Test (WHO). Captures consumption, dependence, and harm. Validated cross-culturally; better than CAGE for identifying hazardous (not yet dependent) drinking.' },
    { cat: 'Domain 2', front: 'MoCA vs MMSE', back: 'Both screen cognition. MMSE: older, copyrighted, less sensitive to mild impairment, weak on executive function. MoCA: free, more sensitive to MCI, includes executive function and abstraction. MoCA is current first-line tool.' },
    { cat: 'Domain 2', front: 'Delirium vs Dementia', back: 'Delirium: acute onset (hours-days), fluctuating, altered attention/consciousness, often reversible, medical cause (infection, meds, withdrawal). Dementia: gradual, progressive, attention preserved early, alertness intact. Delirium is medical emergency.' },
    { cat: 'Domain 2', front: 'Cyclothymia criteria', back: 'For at least 2 years (1 yr in youth): numerous periods of hypomanic and depressive symptoms that do NOT meet full hypomanic or MDE criteria, present at least half the time, no symptom-free gap >2 months.' },
    { cat: 'Domain 2', front: 'Hypomanic episode duration', back: 'At least 4 consecutive days of elevated/irritable mood + increased energy, plus 3+ symptoms (4 if mood only irritable). NOT severe enough to cause marked impairment or require hospitalization; no psychotic features. Differentiates Bipolar II from Bipolar I.' },
    { cat: 'Domain 2', front: 'Adjustment disorder timing', back: 'Emotional/behavioral symptoms in response to identifiable stressor within 3 months of onset. Symptoms resolve within 6 months after stressor (and its consequences) end. If they persist longer or meet other criteria, recode.' },
    { cat: 'Domain 2', front: 'Anorexia nervosa subtypes', back: 'Restricting type: weight loss via dieting/fasting/exercise, no binge/purge in last 3 months. Binge-eating/purging type: recurrent binge or purge in last 3 months. Severity by BMI.' },
    { cat: 'Domain 2', front: 'Dissociative Identity Disorder', back: 'Disruption of identity by 2+ distinct personality states with recurrent gaps in recall of everyday events. Associated with severe early trauma. Differential from bipolar, schizophrenia, BPD, and malingering.' },
    { cat: 'Domain 2', front: 'Selective Mutism', back: 'Consistent failure to speak in specific social situations (e.g., school) despite speaking elsewhere, for ≥1 month (not limited to first month of school). Significant impact on functioning. Anxiety-spectrum, not a refusal.' },
    { cat: 'Domain 2', front: 'Oppositional Defiant vs Conduct Disorder', back: 'ODD: angry/irritable, argumentative/defiant, vindictive (≥6 months). Conduct Disorder: violates major societal norms or rights of others (aggression, destruction, deceit, serious rule violation). CD is more severe and predicts antisocial PD.' },
    { cat: 'Domain 2', front: 'Catatonia features', back: '3+ of: stupor, catalepsy, waxy flexibility, mutism, negativism, posturing, mannerism, stereotypy, agitation, grimacing, echolalia, echopraxia. Specifier added to many disorders. Medical workup is essential.' },
    { cat: 'Domain 2', front: '"Other Specified" vs "Unspecified"', back: 'Other Specified: clinician names the reason criteria are not met (e.g., short-duration depression). Unspecified: clinician chooses not to specify, often in emergency/limited-info settings. Both used when full criteria are not met.' },

    // DOMAIN 3
    { cat: 'Domain 3', front: 'CBT cognitive distortions', back: 'All-or-nothing, overgeneralization, mental filter, disqualifying the positive, jumping to conclusions (mind-reading, fortune-telling), magnification/minimization, emotional reasoning, "should" statements, labeling, personalization.' },
    { cat: 'Domain 3', front: 'DBT four modules', back: 'Mindfulness, Distress Tolerance, Emotion Regulation, Interpersonal Effectiveness. Developed for borderline personality and chronic suicidality but applied broadly.' },
    { cat: 'Domain 3', front: 'Motivational Interviewing — OARS', back: 'Open-ended questions, Affirmations, Reflective listening, Summaries. Combined with empathy, developing discrepancy, rolling with resistance, supporting self-efficacy.' },
    { cat: 'Domain 3', front: 'Solution-Focused Brief Therapy hallmarks', back: 'Miracle question, scaling questions (1-10), exception-finding, strengths and resources focus, brief (5-10 sessions), client as expert, future-oriented.' },
    { cat: 'Domain 3', front: 'Narrative Therapy', back: 'Externalize the problem ("the depression" not "your depression"). Identify unique outcomes that contradict problem-saturated story. Re-author the client’s narrative. White & Epston.' },
    { cat: 'Domain 3', front: 'Person-Centered three conditions (Rogers)', back: 'Unconditional positive regard, empathy, congruence (genuineness). The therapeutic relationship itself is the change agent.' },
    { cat: 'Domain 3', front: 'Trauma-Focused CBT phases', back: 'Psychoeducation, Parenting skills, Relaxation, Affective expression, Cognitive coping, Trauma narrative, In-vivo exposure, Conjoint sessions, Enhancing safety. Evidence-based for child trauma.' },
    { cat: 'Domain 3', front: 'EMDR phases', back: 'History/treatment planning, Preparation, Assessment, Desensitization (with bilateral stimulation), Installation, Body scan, Closure, Reevaluation. Evidence-based for PTSD.' },
    { cat: 'Domain 3', front: 'Structural Family Therapy (Minuchin)', back: 'Map family structure, joining, enactment (have family demonstrate problem in session), restructuring. Goals: clear boundaries, appropriate hierarchy (parents in charge), differentiated subsystems.' },
    { cat: 'Domain 3', front: 'Bowen Family Systems concepts', back: 'Differentiation of self, multigenerational transmission, triangles, emotional cutoff, family projection, sibling position. Use of genograms (3+ generations).' },
    { cat: 'Domain 3', front: 'Tuckman stages of group development', back: 'Forming → Storming → Norming → Performing → Adjourning. Leader role shifts: directive (forming) → containing (storming) → facilitative (norming/performing) → grief-guiding (adjourning).' },
    { cat: 'Domain 3', front: "Yalom's curative factors", back: 'Universality, instillation of hope, imparting information, altruism, corrective family recapitulation, socializing techniques, imitative behavior, interpersonal learning, group cohesiveness, catharsis, existential factors.' },
    { cat: 'Domain 3', front: "Roberts' 7-stage crisis intervention", back: '(1) Plan/assess incl. lethality, (2) Rapport, (3) Identify problems, (4) Deal with feelings, (5) Generate alternatives, (6) Action plan, (7) Follow-up.' },
    { cat: 'Domain 3', front: 'Psychological First Aid (PFA) vs CISD', back: 'PFA is the current standard immediately post-trauma (contact, safety, stabilization, information, practical help, social connection, coping info, linkage). CISD (debriefing) has evidence it may increase PTSD risk and should not be routinely used.' },
    { cat: 'Domain 3', front: 'Single-subject research design', back: 'A-B (baseline then intervention), A-B-A (return to baseline), A-B-A-B (reintroduce intervention). Demonstrates intervention effect with individual clients.' },
    { cat: 'Domain 3', front: 'Termination tasks', back: 'Review goals/progress, process feelings, consolidate gains, plan for relapse and warning signs, provide referrals, leave door open. Give adequate notice. Document.' },
    // Domain 3 NEW
    { cat: 'Domain 3', front: 'Behavioral Activation', back: 'CBT-derived technique for depression: schedule mastery and pleasure activities to break avoidance/withdrawal cycle. Action precedes motivation. Strong evidence; often as effective as full CBT for depression.' },
    { cat: 'Domain 3', front: 'Systematic desensitization (Wolpe)', back: 'Pair graduated exposure to a feared stimulus with relaxation, working up a fear hierarchy. Based on reciprocal inhibition — cannot be relaxed and anxious simultaneously. Classic anxiety treatment.' },
    { cat: 'Domain 3', front: 'Flooding vs graduated exposure', back: 'Graduated: stepwise hierarchy from low to high anxiety stimuli. Flooding: prolonged, intense exposure to highest-anxiety stimulus until anxiety extinguishes. Both work; graduated more tolerable for most clients.' },
    { cat: 'Domain 3', front: 'Cognitive Processing Therapy (CPT)', back: 'Manualized 12-session evidence-based trauma therapy. Focus on stuck points — maladaptive beliefs about safety, trust, power, esteem, intimacy. Written impact statements and Socratic dialogue. Strong evidence for PTSD.' },
    { cat: 'Domain 3', front: 'Prolonged Exposure (PE) therapy', back: 'Evidence-based PTSD treatment (Foa). Imaginal exposure to trauma memory plus in vivo exposure to avoided stimuli, with psychoeducation and breathing retraining. Typically 8-15 sessions.' },
    { cat: 'Domain 3', front: 'Interpersonal Therapy (IPT)', back: 'Time-limited (12-16 sessions), focused on current relational triggers of depression. Four problem areas: grief, interpersonal disputes, role transitions, interpersonal deficits. Strong evidence for depression, perinatal depression.' },
    { cat: 'Domain 3', front: 'ACT six core processes', back: 'Acceptance, Cognitive Defusion, Present-Moment Awareness, Self-as-Context, Values, Committed Action — combined as the "hexaflex" yielding psychological flexibility. Symptom reduction is a byproduct of value-aligned action.' },
    { cat: 'Domain 3', front: 'Mindfulness-Based Cognitive Therapy (MBCT)', back: 'Segal, Williams, Teasdale. 8-week group program integrating mindfulness practices with CBT. Strong evidence for preventing relapse of recurrent depression.' },
    { cat: 'Domain 3', front: 'REBT — ABC model (Ellis)', back: 'Activating event → Beliefs (rational or irrational) → Consequences (emotional/behavioral). Disputing irrational beliefs (D) leads to new effective beliefs (E). Predecessor of CBT; assertive challenging style.' },
    { cat: 'Domain 3', front: 'Empty-chair technique (Gestalt, Perls)', back: 'Client dialogues with an absent person, a part of self, or a feeling placed in an empty chair, then switches chairs to take the other role. Surfaces unfinished business and integrates split selves.' },
    { cat: 'Domain 3', front: 'Reinforcement schedules', back: 'Fixed Ratio (after set #), Variable Ratio (avg #, e.g., slot machine — highest resistance to extinction), Fixed Interval (after set time), Variable Interval (avg time). Variable schedules produce most persistent behavior.' },
    { cat: 'Domain 3', front: 'Token economy', back: 'Structured behavioral system: target behaviors earn tokens exchangeable for reinforcers. Used in psychiatric units, classrooms, residential programs. Effective when target behaviors and exchange rates are clearly defined.' },
    { cat: 'Domain 3', front: 'Premack principle', back: 'A high-probability behavior reinforces a low-probability behavior ("first vegetables, then dessert"). Used in parenting, behavior plans, classroom contingencies.' },
    { cat: 'Domain 3', front: 'Termination — planned vs unplanned vs premature', back: 'Planned: collaborative, goal-met or transition. Unplanned: ends due to worker leaving, agency closure, insurance loss. Premature: client drops out unilaterally. Each has distinct ethical handling.' },
    { cat: 'Domain 3', front: 'Logic model components', back: 'Inputs → Activities → Outputs → Outcomes (short, medium) → Impact. Visualizes how resources and program activities produce intended change. Foundational for program planning and evaluation.' },
    { cat: 'Domain 3', front: 'Harm reduction principles', back: 'Pragmatic, non-judgmental, client-driven; abstinence not required. Examples: needle exchange, naloxone distribution, MAT, safer-use education. NASW-endorsed and evidence-based.' },

    // DOMAIN 4
    { cat: 'Domain 4', front: 'Six NASW core values', back: 'Service, Social Justice, Dignity and Worth of the Person, Importance of Human Relationships, Integrity, Competence.' },
    { cat: 'Domain 4', front: 'When MUST you break confidentiality?', back: 'Imminent harm to self, imminent harm to identifiable others (Tarasoff), suspected child/vulnerable adult abuse, court orders/subpoenas, client written authorization, mandated audits.' },
    { cat: 'Domain 4', front: 'Informed consent required elements', back: 'Nature/purpose of services, risks/benefits, alternatives, confidentiality limits, fees, right to refuse/withdraw, who provides/supervises, anticipated timeframe, complaint process. In language client understands. Ongoing.' },
    { cat: 'Domain 4', front: 'Boundary crossing vs violation', back: 'Crossing: deviation that may be acceptable (small gift, attending funeral) if documented and non-exploitative. Violation: harmful, exploitative (sexual contact, business deals, large gifts).' },
    { cat: 'Domain 4', front: 'Sexual contact with clients', back: 'NEVER with current clients. NEVER with former clients in most circumstances per NASW Code — no permitted "waiting period" when potential for harm exists. Also prohibited with client’s relatives or close associates.' },
    { cat: 'Domain 4', front: 'Reporting unethical colleague — first step', back: 'When feasible and safe, discuss concerns directly with the colleague first. If unresolved, escalate to supervisor, employer, then licensing board. Some violations (sexual misconduct) require formal report.' },
    { cat: 'Domain 4', front: 'Termination ethics', back: 'May terminate when goals met, no benefit, risk to worker, or non-payment after discussion. Must give reasonable notice, provide referrals, ensure continuity. Abrupt termination = abandonment.' },
    { cat: 'Domain 4', front: 'Self-disclosure guidance', back: 'Use sparingly. Ask: does this serve the client or me? Cultural humility may sometimes call for limited disclosure (e.g., language fluency, broad identity acknowledgment) but personal details rarely belong in the room.' },
    { cat: 'Domain 4', front: 'Documentation standards', back: 'Timely, accurate, sufficient. Note clinically relevant information. Avoid jargon, speculation, bias. Protect privacy in storage and transmission. Retain per Kansas BSRB and HIPAA requirements.' },
    { cat: 'Domain 4', front: 'HIPAA TPO', back: 'Treatment, Payment, Healthcare Operations — the three purposes for which PHI can be used and disclosed without specific authorization (subject to minimum necessary).' },
    { cat: 'Domain 4', front: 'Scope of competence', back: 'Practice only in areas of training, education, certification, supervised experience. Pursue training before adding new populations or modalities. Stay current.' },
    { cat: 'Domain 4', front: 'Impaired social worker obligation', back: 'A worker whose practice is impaired (mental health, substance use, personal crisis) must seek help and not allow impairment to harm clients. Colleagues should address concerns directly first when possible.' },
    { cat: 'Domain 4', front: "Reamer's ethical decision-making framework", back: 'Systematic approach: identify the issue, identify stakeholders, identify ethical principles in conflict, weigh consequences, consult, decide and document. Other models: Dolgoff-Loewenberg-Harrington (ETHIC).' },
    { cat: 'Domain 4', front: 'Telehealth ethical considerations', back: 'Secure platforms, verify client location and identity, jurisdiction issues (where licensed to practice), emergency planning (local resources at client’s location), informed consent specific to telehealth.' },
    { cat: 'Domain 4', front: 'Cultural humility vs competence', back: 'Competence: mastery of cultural knowledge (mid-20th century framing). Humility: lifelong self-reflection, recognizing power imbalances, learning from clients. 2026 framing favors humility — you cannot master another culture.' },
