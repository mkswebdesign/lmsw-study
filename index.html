    { cat: 'Domain 4', front: 'Bartering with clients', back: 'Generally discouraged. May be acceptable when culturally appropriate, non-exploitative, client-initiated, with written agreement. Risks: power imbalance, valuation disputes. Document carefully if used.' },
    // Domain 4 NEW
    { cat: 'Domain 4', front: 'Privileged communication', back: 'Legal protection (state statute) that prevents compelled disclosure of confidential client communications in court. Privilege belongs to the client; only the client (or legal representative) can waive it. Subject to limits (mandated reporting, Tarasoff, etc.).' },
    { cat: 'Domain 4', front: 'Subpoena vs court order', back: 'A subpoena is a request — you must respond, but you do not automatically disclose. A court order from a judge can compel disclosure. When subpoenaed without client consent: assert privilege, seek clarification, consult attorney.' },
    { cat: 'Domain 4', front: 'Involuntary commitment criteria (general)', back: 'Mental illness PLUS at least one of: imminent danger to self, imminent danger to others, gravely disabled (cannot meet basic needs due to mental illness). Standards vary by state; Kansas uses the Care and Treatment Act.' },
    { cat: 'Domain 4', front: 'Kansas Care and Treatment Act', back: "K.S.A. 59-2945 et seq. Governs involuntary inpatient and outpatient commitment for mental illness in Kansas. Requires probable-cause and full hearings, treatment plans, periodic review. LMSWs may participate in evaluation/treatment but final commitment is a judicial process." },
    { cat: 'Domain 4', front: 'Mature minor / emancipated minor', back: 'Emancipated: legally treated as adult (marriage, military, court order). Mature minor doctrine: a minor judged capable of understanding may consent to some healthcare decisions. Varies by state; Kansas has specific provisions for mental health and substance use.' },
    { cat: 'Domain 4', front: '42 CFR Part 2 — SUD records', back: 'Federal regulation protecting substance-use treatment records held by federally assisted SUD programs. Stricter than HIPAA. Generally requires specific written authorization per disclosure. Recent updates moved some provisions closer to HIPAA but core protections remain.' },
    { cat: 'Domain 4', front: 'Tarasoff — elements', back: 'Triggered when: (1) the client communicates a serious threat of violence, (2) against an identifiable victim or victims. The clinician must take reasonable steps to protect (warn victim, contact police, hospitalize). Originated Cal. 1976; most states have a version.' },
    { cat: 'Domain 4', front: 'NPDB — National Practitioner Data Bank', back: 'Federal database of medical malpractice payments, adverse licensure actions, clinical privileges actions, professional society membership actions, and Medicare/Medicaid exclusions. Queried during licensure and credentialing.' },
    { cat: 'Domain 4', front: 'Pro bono obligation', back: 'NASW Code: social workers should contribute a portion of professional time and expertise without expectation of return. Not a hard hour requirement, but an aspirational duty rooted in the Service value.' },
    { cat: 'Domain 4', front: 'Conflict of interest — management', back: 'Disclose to all affected parties, take reasonable steps to resolve, and protect client interests as the primary obligation. When unresolvable, terminate the relationship that creates the conflict (usually NOT the client relationship).' },
    { cat: 'Domain 4', front: 'Managed care — ethical pressures', back: 'Conflicts can arise between insurer rules and client needs. Advocate for medically necessary care; document carefully; do not falsify diagnosis to obtain coverage; inform clients about coverage limits and alternatives.' },
    { cat: 'Domain 4', front: 'Research with clients — core requirements', back: 'IRB review where applicable, voluntary informed consent, right to refuse without losing services, protection from harm, confidentiality of data, dissemination that does not identify participants. Dual role of clinician/researcher must be transparent.' },
    { cat: 'Domain 4', front: 'Social media — working principles', back: 'Maintain professional online presence. Do not "friend" clients on personal accounts. Do not search clients’ online presence without clinical reason and consent. Address social media in informed consent. Recognize that anything posted can be discoverable.' },
    { cat: 'Domain 4', front: 'Multiple/dual relationships', back: 'Avoid when avoidable. When unavoidable (small communities, religious settings, supervisor/teacher of one’s own client’s child), set clear boundaries, document the conflict, consult, and prioritize client welfare. Sexual multiple relationships are categorically prohibited.' },
    { cat: 'Domain 4', front: 'Burnout vs secondary traumatic stress vs compassion fatigue', back: 'Burnout: chronic exhaustion from workload/system issues. Secondary Traumatic Stress (STS): trauma symptoms from exposure to clients’ trauma material. Compassion Fatigue: STS + burnout combined. Vicarious Trauma: cognitive shifts (worldview) from trauma work. All are ethical concerns.' },
    { cat: 'Domain 4', front: 'Kansas BSRB renewal cycle (LMSW)', back: '2-year cycle, 40 contact hours of continuing education including at least 6 hours in ethics. Track and retain CE documentation. Late renewal incurs penalties; lapsed license requires reinstatement process.' },
  ];

  // ============ PRACTICE QUESTIONS (deep, ~110) ============
  const questions = [
    // DOMAIN 1 (existing)
    { cat: 'Domain 1', stem: 'A 4-year-old says her stuffed animal is "sad and crying" after being left in the rain. According to Piaget, this reflects:', options: ['Concrete operational reasoning', 'Animism, typical of the preoperational stage', 'Conservation deficit', 'Postconventional moral thinking'], correct: 1, rationale: 'Animism — attributing life/feelings to inanimate objects — is characteristic of preoperational thought (ages 2-7). Conservation deficit relates to understanding mass/volume, not feelings. Concrete operations begins around 7.' },
    { cat: 'Domain 1', stem: "A 70-year-old client reviewing his life expresses regret for missed opportunities but also pride in his children's accomplishments. Erikson would identify this stage as:", options: ['Generativity vs. Stagnation', 'Integrity vs. Despair', 'Intimacy vs. Isolation'], correct: 1, rationale: 'Integrity vs. Despair is the late-life stage where one reflects on the life lived. The mix of regret and pride is the active negotiation of this conflict. Generativity is middle adulthood.' },
    { cat: 'Domain 1', stem: 'A child shows contradictory behaviors at reunion with caregiver — approaching then freezing, looking dazed. This pattern is MOST consistent with:', options: ['Secure attachment', 'Insecure-avoidant attachment', 'Disorganized attachment'], correct: 2, rationale: 'Disorganized attachment involves contradictory, dazed, or apprehensive behaviors at reunion. It is associated with frightening or unpredictable caregiving, often trauma or abuse. Avoidant infants ignore the caregiver. Secure infants seek and are comforted.' },
    { cat: 'Domain 1', stem: "A first-generation immigrant client maintains heritage language at home, participates in mainstream cultural activities at work, and feels comfortable in both. According to Berry's model, this is:", options: ['Assimilation', 'Integration', 'Marginalization'], correct: 1, rationale: "Integration involves maintaining one's heritage culture AND engaging with the new culture. Berry's research links integration to the best mental health outcomes. Assimilation drops the heritage culture; marginalization rejects both." },
    { cat: 'Domain 1', stem: 'A Black female client describes how her experiences as a single mother in poverty cannot be understood by examining race, gender, or class alone. The social worker recognizes this as:', options: ['Cultural relativism', 'Intersectionality', 'Internalized oppression'], correct: 1, rationale: 'Intersectionality (Crenshaw) describes how multiple social identities intersect to create unique experiences of oppression. Examining identities in isolation misses the compounded effects.' },
    { cat: 'Domain 1', stem: 'A client describes leaving their abuser, then returning after the abuser apologizes and promises to change. This pattern is MOST consistent with:', options: ['The cycle of intimate partner violence', 'Codependency', 'Trauma bonding (only)'], correct: 0, rationale: 'The cycle of violence (tension building → acute battering → reconciliation/honeymoon) explains the return pattern. Trauma bonding is a contributing dynamic but the question describes the full cycle. Couples therapy is contraindicated during active IPV.' },
    { cat: 'Domain 1', stem: 'A school-age child shows poor hygiene, eats voraciously when food is offered, falls asleep in class, and has unmet medical needs. The most likely concern is:', options: ['Physical abuse', 'Sexual abuse', 'Neglect'], correct: 2, rationale: 'These are classic indicators of neglect — the failure to provide for basic needs. Physical abuse typically presents with unexplained injuries; sexual abuse with age-inappropriate behaviors. In Kansas, reasonable suspicion of neglect requires a DCF report.' },
    { cat: 'Domain 1', stem: 'A 24-year-old college graduate moves home, refuses to discuss his future plans, and seems to be drifting without commitment. Erikson would identify the active conflict as:', options: ['Industry vs. Inferiority', 'Identity vs. Role Confusion', 'Intimacy vs. Isolation'], correct: 1, rationale: 'Although Identity vs. Role Confusion is traditionally adolescence (12-18), in modern contexts it commonly extends into emerging adulthood. The avoidance of commitment and drift are classic role confusion. Industry is school-age (6-12).' },
    { cat: 'Domain 1', stem: 'A grandmother is the primary caregiver for her grandchildren after their parents died of overdose. The social worker should FIRST:', options: ['Provide grief counseling to the grandmother', 'Conduct a strengths-based assessment of the new family system including resources, needs, and grief', 'Refer the children for individual therapy'], correct: 1, rationale: 'The FIRST step is always comprehensive assessment of the full system. Grief and individual referrals are likely needed but cannot be planned without understanding the entire picture. Kinship care needs are complex.' },
    { cat: 'Domain 1', stem: 'A Native American client is reluctant to discuss recently deceased relatives in detail. The MOST culturally responsive response is to:', options: ['Insist on processing the grief in session', 'Respect cultural protocols around discussing the deceased, ask about preferences, and adapt the approach', 'Refer to a different therapist'], correct: 1, rationale: 'Many Indigenous cultures have specific protocols around discussing the deceased. Cultural humility requires asking, learning, and adapting rather than imposing dominant grief models. Referral may not be needed if the worker can adapt.' },
    { cat: 'Domain 1', stem: "Using Bronfenbrenner's model, a child's school is part of the:", options: ['Microsystem', 'Mesosystem', 'Exosystem'], correct: 0, rationale: "The microsystem is the immediate environment the child directly interacts with — family, school, peers, neighborhood. The mesosystem is the interaction BETWEEN microsystems (e.g., parent-teacher conferences). The exosystem affects the child indirectly (parent's workplace)." },
    { cat: 'Domain 1', stem: 'A trans client describes chronic stress from anticipated rejection, internalized stigma, and daily microaggressions. The MOST useful conceptual framework is:', options: ['Reaction formation', 'Minority stress model', 'Cycle of violence'], correct: 1, rationale: 'The minority stress model (Meyer) explains how chronic stigma-related stressors (distal and proximal) produce health disparities in marginalized groups. It is the standard framework for understanding LGBTQ+ mental health.' },
    // Domain 1 NEW
    { cat: 'Domain 1', stem: 'A 7-year-old can solve a math problem with parental guidance that he cannot solve alone. A Vygotskian social worker would say the parent is:', options: ['Reinforcing rote behavior', 'Scaffolding within the zone of proximal development', 'Modeling postconventional reasoning'], correct: 1, rationale: 'In Vygotsky’s sociocultural theory, the ZPD is the gap between independent ability and ability with guidance. Scaffolding is the supportive help that enables a learner to perform inside the ZPD; it fades as competence grows.' },
    { cat: 'Domain 1', stem: 'A boy whose father drinks heavily begins drinking himself in middle school. Bandura would attribute this MOST to:', options: ['Operant conditioning', 'Observational learning and modeling', 'Cognitive dissonance'], correct: 1, rationale: 'Bandura’s social learning theory emphasizes that behavior is learned through observing and modeling others, especially salient role models, in addition to direct reinforcement. The father is the model.' },
    { cat: 'Domain 1', stem: 'A client who is furious at her boss comes home and yells at her partner. This is MOST clearly an example of:', options: ['Projection', 'Displacement', 'Reaction formation'], correct: 1, rationale: 'Displacement redirects feelings from the original (threatening) target to a safer one. Projection attributes one’s own unacceptable feelings to others. Reaction formation expresses the opposite of an unacceptable feeling.' },
    { cat: 'Domain 1', stem: 'A coworker frequently asks a Black colleague where she is "really from." The Black colleague names this as harmful. The pattern is MOST accurately described as:', options: ['A microassault', 'A microinvalidation', 'A microinsult'], correct: 2, rationale: "Sue's typology: microassaults are overt slurs; microinsults are rude/insensitive remarks demeaning identity; microinvalidations negate the experiences of marginalized people. 'Where are you really from' demeans by implying she does not belong — a microinsult." },
    { cat: 'Domain 1', stem: 'A trauma survivor goes silent and motionless when triggered, later describing feeling "frozen and far away." Polyvagal theory would best describe this as:', options: ['A ventral vagal state', 'A sympathetic mobilized state', 'A dorsal vagal collapse'], correct: 2, rationale: 'Dorsal vagal shutdown is the freeze/collapse response when neither fight nor flight is possible. Treatment emphasizes co-regulation, safety cues, and titrated arousal to return the client toward ventral vagal social engagement.' },
    { cat: 'Domain 1', stem: 'An adult son is taking money from his elderly mother’s account without her clear consent. The Kansas social worker should:', options: ['Contact APS via the Kansas Protection Report Center (1-800-922-5330) and continue building the case', 'Confront the son and demand he stop', 'Wait until the mother authorizes a report'], correct: 0, rationale: 'Financial exploitation of a vulnerable adult is reportable in Kansas. Reasonable suspicion is sufficient — the worker does not need proof or the alleged victim’s permission to report. APS investigates.' },
    { cat: 'Domain 1', stem: 'An immigrant client refuses to learn the host culture’s language and isolates from mainstream society. According to Berry, this strategy is:', options: ['Integration', 'Separation', 'Marginalization'], correct: 1, rationale: 'Separation = retain heritage culture, reject host culture engagement. Marginalization rejects BOTH. Berry’s research links integration (both) to best mental health outcomes; separation can be adaptive when host culture is hostile.' },
    { cat: 'Domain 1', stem: 'A teenager scores 6 on the ACE questionnaire. The MOST appropriate clinical use of this information is to:', options: ['Predict a specific psychiatric diagnosis', 'Indicate elevated dose-response risk for physical and mental health problems and inform trauma-informed care', 'Refer to immediate inpatient treatment'], correct: 1, rationale: 'ACE scores indicate dose-response risk across the lifespan. They are not diagnostic and do not justify specific placement; they prompt trauma-informed screening, prevention, and intervention.' },
    { cat: 'Domain 1', stem: 'A widowed client one year after her husband’s death finds a way to continue a meaningful internal relationship with him while building a new life. In Worden’s framework, this represents:', options: ['Task 1: Accept the reality of loss', 'Task 3: Adjust to the environment without the deceased', 'Task 4: Find an enduring connection while moving forward'], correct: 2, rationale: "Worden's fourth task: find an enduring connection with the deceased while moving forward with life. This corrected an earlier model that emphasized 'letting go' as the endpoint." },
    { cat: 'Domain 1', stem: 'A 19-year-old leaves for college, and her parents struggle with the change. Carter & McGoldrick would name this:', options: ['Joining stage', 'Launching stage', 'Adolescent stage'], correct: 1, rationale: 'The launching-children stage is one of the most stressful transitions, requiring renegotiation of marital, parent-child, and three-generation relationships.' },
    { cat: 'Domain 1', stem: 'A gay client who recently moved from a hostile rural community to an affirming city reports symptoms easing. The framework that best explains this is:', options: ['Spontaneous remission', 'Reduced minority stress with environmental change', 'Adjustment disorder resolution only'], correct: 1, rationale: 'Minority stress theory predicts that environment moderates the chronic stress of marginalized identity. Moving to a safer/affirming environment reduces distal stressors and can lessen proximal stigma processes; symptom improvement follows.' },
    { cat: 'Domain 1', stem: 'A 75-year-old white man, recently widowed, has access to firearms and refuses outside help. Risk-stratification should recognize him as:', options: ['Low risk because he denies a plan', 'Highest demographic suicide risk in the U.S., warranting active engagement and means safety counseling', 'Average risk because of age'], correct: 1, rationale: 'Older white men have the highest suicide rate in the U.S. Recent loss, isolation, refusal of help, and firearm access compound risk. Active outreach, family involvement, and lethal-means counseling are indicated.' },

    // DOMAIN 2 (existing)
    { cat: 'Domain 2', stem: 'A client reports two weeks of depressed mood, anhedonia, weight loss, insomnia, fatigue, worthlessness, and difficulty concentrating. The MOST likely diagnosis is:', options: ['Persistent depressive disorder', 'Major depressive disorder', 'Adjustment disorder with depressed mood'], correct: 1, rationale: 'MDD requires ≥5 symptoms (including depressed mood OR anhedonia) for ≥2 weeks with impairment. Persistent depressive disorder requires ≥2 years of depressed mood. Adjustment disorder follows an identifiable stressor and is less severe.' },
    { cat: 'Domain 2', stem: 'A client switches topics rapidly mid-sentence, never returning to the original point. This thought process is BEST described as:', options: ['Circumstantial', 'Tangential', 'Flight of ideas'], correct: 1, rationale: 'Tangential thinking goes off topic without returning. Circumstantial includes excess detail but eventually reaches the point. Flight of ideas involves rapid shifts driven by associations, typical in mania.' },
    { cat: 'Domain 2', stem: 'A client describes intrusive trauma memories, avoidance of reminders, negative mood, and hypervigilance for 5 weeks following a sexual assault. The MOST likely diagnosis is:', options: ['Acute stress disorder', 'Post-traumatic stress disorder', 'Adjustment disorder'], correct: 1, rationale: 'PTSD requires symptoms >1 month. The 5-week timeline rules out ASD (3 days-1 month). Symptom clusters (intrusion, avoidance, negative mood/cognition, arousal) plus duration match PTSD.' },
    { cat: 'Domain 2', stem: 'A client tells the worker she has been planning her suicide, has access to her father\'s firearm, and intends to act tonight. The FIRST step is to:', options: ['Develop a safety plan', 'Initiate emergency intervention to ensure safety, including mobile crisis or hospitalization', 'Schedule a follow-up appointment'], correct: 1, rationale: 'With imminent suicidal intent, plan, and means, safety planning alone is insufficient. Emergency intervention — mobile crisis, ER, or 988 with escort — is required. Confidentiality must yield to safety.' },
    { cat: 'Domain 2', stem: 'A new client presents in crisis with no documented history. The FIRST clinical step is:', options: ['Begin trauma processing', 'Conduct a thorough biopsychosocial assessment including safety screening', 'Provide a behavioral activation worksheet'], correct: 1, rationale: 'Comprehensive biopsychosocial assessment is the foundation of all subsequent intervention. You cannot intervene without understanding the whole person and current safety context. Trauma processing before stabilization can re-traumatize.' },
    { cat: 'Domain 2', stem: 'A client is grandiose, has not slept for 6 days, is talking rapidly, has started multiple high-risk business ventures, and lost touch with reality. This is MOST consistent with:', options: ['Manic episode', 'Hypomanic episode', 'Mixed episode'], correct: 0, rationale: 'Manic episodes are ≥7 days (or any duration with hospitalization), severe enough to impair function or include psychotic features. Hypomania is 4-6 days without severe impairment or psychosis. Mixed features would include depression simultaneously.' },
    { cat: 'Domain 2', stem: 'A young adult shows persistent instability in relationships and self-image, intense fear of abandonment, self-harm behaviors, chronic emptiness, and affective instability. The MOST likely diagnosis is:', options: ['Bipolar II disorder', 'Borderline personality disorder', 'Histrionic personality disorder'], correct: 1, rationale: 'BPD is characterized by pervasive instability across relationships, self-image, and affect plus impulsivity (≥5 of 9 criteria). Bipolar mood cycles are typically longer; histrionic features attention-seeking rather than abandonment fears.' },
    { cat: 'Domain 2', stem: 'A 5-year-old has restricted interests, repetitive movements, deficits in social communication, and rigidity to change. The MOST likely diagnosis is:', options: ['Reactive attachment disorder', 'Autism spectrum disorder', 'ADHD, combined type'], correct: 1, rationale: 'ASD requires deficits in social communication AND restricted/repetitive behaviors present early. Reactive attachment relates to early caregiving deprivation. ADHD does not include the same social communication deficits.' },
    { cat: 'Domain 2', stem: 'A goal stated as "client will feel happier" is not appropriate because:', options: ['It is too long-term', 'It is not measurable, specific, or time-bound', 'It is not strengths-based'], correct: 1, rationale: 'SMART goals must be specific, measurable, achievable, relevant, time-bound. "Feel happier" cannot be evaluated or operationalized. Better: "Client will report PHQ-9 score ≤5 within 12 weeks."' },
    { cat: 'Domain 2', stem: 'A 16-year-old reports cutting her arms when she feels overwhelmed but denies intent to die. This is MOST accurately:', options: ['Suicidal behavior', 'Non-suicidal self-injury (NSSI)', 'Antisocial behavior'], correct: 1, rationale: 'NSSI is the deliberate destruction of body tissue without suicidal intent, typically for emotion regulation. It is a risk factor for future suicidality and warrants assessment of suicidal ideation, but is not equivalent to a suicide attempt.' },
    { cat: 'Domain 2', stem: 'A client engages in extreme caloric restriction with BMI 16, intense fear of weight gain, distorted body image, and absence of recognition of low weight as a problem. The MOST likely diagnosis is:', options: ['Bulimia nervosa', 'Anorexia nervosa, restricting type', 'Binge-eating disorder'], correct: 1, rationale: 'Anorexia requires restriction leading to significantly low weight, intense fear of weight gain, and disturbance in self-perception. Restricting subtype: no binge/purge in the last 3 months. Severity rated by BMI.' },
    { cat: 'Domain 2', stem: 'During the MSE, the worker notes constricted facial expression and limited emotional variation across topics. The MOST accurate description is:', options: ['Flat affect', 'Restricted affect', 'Labile affect'], correct: 1, rationale: 'Restricted affect = reduced range of emotional expression. Flat affect = nearly absent emotional expression (more severe). Labile affect = rapid, dramatic shifts.' },
    // Domain 2 NEW
    { cat: 'Domain 2', stem: 'A primary-care client scores PHQ-9 = 17 and PHQ-9 item 9 = 2 ("more than half the days" of thoughts of self-harm). The MOST appropriate next step is:', options: ['Begin SSRI without further evaluation', 'Conduct an immediate suicide-risk assessment and discuss next steps including safety planning', 'Repeat the PHQ-9 in 4 weeks'], correct: 1, rationale: 'A PHQ-9 score of 17 indicates moderately severe depression and item 9 ≥1 always triggers immediate suicide-risk assessment regardless of total. Address risk before pharmacotherapy decisions.' },
    { cat: 'Domain 2', stem: 'An 82-year-old presents with acute confusion, fluctuating attention, disorientation, and visual hallucinations starting yesterday. The MOST likely diagnosis is:', options: ['Major neurocognitive disorder due to Alzheimer’s', 'Delirium (rule out medical cause)', 'Schizophrenia, late-onset'], correct: 1, rationale: 'Acute onset, fluctuating course, and altered attention/consciousness are classic delirium. It is typically a medical emergency — evaluate for infection (UTI, pneumonia), metabolic disturbance, medications, substance withdrawal.' },
    { cat: 'Domain 2', stem: 'A client describes 3 years of low-grade depressed mood most days, never severe but never resolving. The MOST likely diagnosis is:', options: ['Major depressive disorder', 'Persistent depressive disorder (dysthymia)', 'Adjustment disorder with depressed mood'], correct: 1, rationale: 'Persistent depressive disorder = depressed mood most of the day, more days than not, for ≥2 years (1 year for youth), without symptom-free gaps >2 months. The duration distinguishes it from MDD.' },
    { cat: 'Domain 2', stem: 'A client experiences 5 days of elevated mood, increased energy, decreased need for sleep, and goal-directed activity without psychosis, hospitalization, or severe impairment. This is MOST consistent with:', options: ['A manic episode', 'A hypomanic episode', 'A mixed episode'], correct: 1, rationale: 'Hypomania = ≥4 consecutive days, plus 3+ symptoms (4 if mood only irritable), without marked impairment, hospitalization, or psychotic features. Differentiates Bipolar II from Bipolar I.' },
    { cat: 'Domain 2', stem: 'A child with severely restricted food intake has no body-image disturbance, no fear of weight gain, but extreme sensory aversion to food textures and resultant weight loss. The MOST likely diagnosis is:', options: ['Anorexia nervosa, restricting type', 'Avoidant/Restrictive Food Intake Disorder (ARFID)', 'Pica'], correct: 1, rationale: 'ARFID involves restricted intake leading to nutritional deficiency or weight loss WITHOUT the body-image disturbance or fear of weight gain seen in anorexia. Often sensory or fear-of-aversive-consequences based.' },
    { cat: 'Domain 2', stem: 'During a safety plan, after identifying warning signs, the NEXT step in the Stanley-Brown model is to:', options: ['Call 911', 'Identify internal coping strategies the client can use alone', 'List medications to remove from the home'], correct: 1, rationale: 'Stanley-Brown sequence: warning signs → internal coping → social contacts for distraction → people for help → professionals/agencies → means restriction. Internal coping comes before reaching out to others.' },
    { cat: 'Domain 2', stem: 'A medical workup reveals hypothyroidism in a client previously diagnosed with MDD. The MOST appropriate diagnostic update is:', options: ['MDD, recurrent, in partial remission', 'Depressive disorder due to another medical condition (hypothyroidism)', 'Adjustment disorder with depressed mood'], correct: 1, rationale: 'When mood symptoms are the direct physiological consequence of a medical condition, DSM-5-TR uses "Depressive Disorder Due to Another Medical Condition." Treat the medical cause; reassess mood.' },
    { cat: 'Domain 2', stem: 'PTSD diagnostic clusters in DSM-5-TR include intrusion, avoidance, negative alterations in cognition/mood, and:', options: ['Alterations in arousal and reactivity', 'Dissociative identity', 'Mania'], correct: 0, rationale: 'PTSD has 4 symptom clusters: intrusion, avoidance, negative alterations in cognition/mood, and alterations in arousal/reactivity. A dissociative subtype exists but is a specifier, not a separate cluster.' },
    { cat: 'Domain 2', stem: 'An 8-year-old is fidgety, interrupts often, struggles to wait turns, makes careless mistakes, and is easily distracted at home AND school for over a year. The MOST consistent diagnosis is:', options: ['ADHD, combined presentation', 'Anxiety disorder', 'Conduct disorder'], correct: 0, rationale: 'ADHD requires ≥6 inattentive AND/OR hyperactive-impulsive symptoms for ≥6 months, present in 2+ settings, with onset before age 12. The vignette includes both inattentive and hyperactive-impulsive symptoms.' },
    { cat: 'Domain 2', stem: 'A clinician documents "Other Specified Depressive Disorder, short-duration depressive episode." This is appropriate when:', options: ['The client meets MDD criteria but for only 1 week', 'The clinician chooses not to specify a reason in a busy ER', 'No symptoms are present'], correct: 0, rationale: '"Other Specified" allows the clinician to name why full criteria are not met (e.g., shorter than 2 weeks). "Unspecified" is used when the clinician chooses NOT to name the reason, often in emergency settings.' },
    { cat: 'Domain 2', stem: 'A safety planning conversation should include lethal-means counseling because:', options: ['It is required for all clients', 'Reducing access to lethal means is one of the most evidence-based suicide prevention strategies', 'Insurance requires it'], correct: 1, rationale: 'Means restriction (especially firearms) substantially reduces suicide deaths because most attempts are impulsive and method-specific. It is a core element of the Stanley-Brown safety plan.' },
    { cat: 'Domain 2', stem: 'A client reports auditory hallucinations and delusions for the past 3 weeks following the recent death of a parent, with no prior history. The MOST likely diagnosis is:', options: ['Schizophrenia', 'Brief psychotic disorder, with marked stressor', 'Bereavement-related MDD'], correct: 1, rationale: 'Brief psychotic disorder = 1 day to <1 month of psychotic symptoms with eventual return to baseline. The "with marked stressor" specifier applies when there is an obvious precipitant such as bereavement.' },
    { cat: 'Domain 2', stem: 'A treatment plan goal reads: "Client will complete one pleasurable activity per day for the next 2 weeks, tracked in a log." This goal best satisfies the SMART criterion of:', options: ['Specific and measurable', 'Strengths-based', 'Trauma-informed'], correct: 0, rationale: 'Specific (one pleasurable activity per day), measurable (tracked in a log), time-bound (2 weeks). Strengths-based and trauma-informed are not part of the SMART acronym (though they are valuable practice orientations).' },

    // DOMAIN 3 (existing)
    { cat: 'Domain 3', stem: 'A client says, "I always mess everything up. I\'m a total failure." The CBT distortion at play is MOST clearly:', options: ['Catastrophizing', 'All-or-nothing thinking', 'Mind reading'], correct: 1, rationale: 'All-or-nothing (or black-and-white) thinking categorizes experience in absolute terms ("always," "total"). Catastrophizing predicts the worst case. Mind reading assumes you know others\' thoughts.' },
    { cat: 'Domain 3', stem: "A client says she's not sure she wants to stop drinking but she's tired of fighting with her wife about it. The MOST appropriate stance is:", options: ['Confront the denial directly', 'Use motivational interviewing to roll with resistance and develop discrepancy', 'Provide a relapse prevention worksheet'], correct: 1, rationale: 'MI matches the client\'s ambivalence with empathy and develops discrepancy between current behavior and her stated values (peace with her wife). Confronting denial often backfires and increases resistance.' },
    { cat: 'Domain 3', stem: 'A family seeks therapy because the 14-year-old refuses to follow any rules and parents disagree about discipline. Minuchin\'s structural approach would FIRST:', options: ['Take the child\'s side and advocate for autonomy', 'Map the family structure, identify hierarchy/boundary issues, and join the family', 'Refer the child to individual therapy'], correct: 1, rationale: 'Structural family therapy begins with mapping (subsystems, boundaries, hierarchy) and joining (building relational engagement). Restructuring (e.g., parents speaking with one voice, clearer hierarchy) follows.' },
    { cat: 'Domain 3', stem: 'A client in week 2 of group therapy is challenging the leader\'s authority and questioning the group\'s purpose. According to Tuckman, the group is in the:', options: ['Forming stage', 'Storming stage', 'Norming stage'], correct: 1, rationale: 'Storming is characterized by power struggles, challenges to leadership, and resistance to group structure. Forming is cautious and leader-dependent; norming sees cohesion and trust emerging.' },
    { cat: 'Domain 3', stem: "After a school shooting, the school invites a debriefing for all students. The MOST evidence-informed response is to:", options: ['Conduct a CISD-style debrief for all students', 'Provide Psychological First Aid and identify students who need additional support', 'Mandate group therapy for all students'], correct: 1, rationale: 'PFA is the current evidence-based standard immediately post-trauma. CISD/critical incident stress debriefing has evidence of possible HARM (increasing PTSD in some). Mandated therapy bypasses informed consent and overpathologizes normal acute reactions.' },
    { cat: 'Domain 3', stem: 'A client who self-harms when overwhelmed is referred for treatment. The MOST evidence-based modality is:', options: ['Psychodynamic therapy', 'Dialectical Behavior Therapy (DBT)', 'Person-centered therapy'], correct: 1, rationale: 'DBT is the strongest evidence-based treatment for self-harm and chronic suicidality, especially with borderline features. Person-centered and psychodynamic may complement but are not first-line for this presentation.' },
    { cat: 'Domain 3', stem: 'A social worker asks a client, "If you woke up tomorrow and your problem was solved, what would be different?" This is MOST consistent with:', options: ['Narrative therapy externalization', 'The miracle question in Solution-Focused Brief Therapy', 'A Bowen genogram'], correct: 1, rationale: 'The miracle question is a hallmark of SFBT. It elicits the client\'s preferred future and identifies concrete behavioral markers of change. Narrative externalization separates the client from the problem ("the depression").' },
    { cat: 'Domain 3', stem: 'A client in crisis says she is overwhelmed but denies any imminent risk. Using Roberts\' 7-stage model, AFTER assessment and rapport, the worker should:', options: ['Develop an action plan', 'Identify the major problems contributing to the crisis', 'Make a referral and end the call'], correct: 1, rationale: 'Roberts\' sequence: (1) assess (incl. lethality), (2) rapport, (3) identify problems, (4) deal with feelings, (5) generate alternatives, (6) action plan, (7) follow-up. Identifying problems precedes action planning.' },
    { cat: 'Domain 3', stem: "A 12-session group is ending and members are sad. The leader's MOST important task is to:", options: ['Add another 6 sessions', 'Acknowledge the loss, review gains, plan for continued growth, and process termination feelings', 'Avoid termination talk to prevent sadness'], correct: 1, rationale: 'Adjourning (Tuckman) involves grief and consolidation. Leaders facilitate ending well: name the loss, review gains, plan for continuity, normalize feelings. Avoidance harms the work.' },
    { cat: 'Domain 3', stem: 'A worker uses A-B-A-B design to evaluate whether a behavioral intervention reduces a child\'s aggressive outbursts. This is:', options: ['A randomized controlled trial', 'A single-subject design with reversal', 'A grounded theory study'], correct: 1, rationale: 'A-B-A-B is a single-subject reversal design that strengthens causal inference by showing behavior change with intervention, return to baseline without, and re-change with intervention.' },
    { cat: 'Domain 3', stem: 'A couple comes for therapy. The wife has been physically assaulted by the husband repeatedly. The social worker should:', options: ['Begin joint sessions to improve communication', 'Refuse couples therapy while IPV is active, address safety separately, and offer appropriate IPV-specific services', 'Refer both to anger management'], correct: 1, rationale: 'Active IPV is a contraindication for couples therapy. Joint sessions can increase risk because the survivor cannot speak freely. Safety, separate services, and survivor-centered planning come first.' },
    { cat: 'Domain 3', stem: "A child trauma survivor is in TF-CBT. Before any trauma narrative work, the therapist should:", options: ['Begin EMDR processing', 'Establish coping skills, psychoeducation, and parent involvement (PRACTICE components)', 'Refer to a psychiatrist'], correct: 1, rationale: 'TF-CBT follows PRACTICE: Psychoeducation, Parenting, Relaxation, Affect, Cognitive coping, Trauma narrative, In-vivo, Conjoint, Enhancing safety. Coping and stabilization always precede narrative work.' },
    // Domain 3 NEW
    { cat: 'Domain 3', stem: 'A depressed client has withdrawn from all activities. The worker collaboratively schedules mastery and pleasure activities throughout the week. This is:', options: ['Cognitive restructuring', 'Behavioral activation', 'Exposure therapy'], correct: 1, rationale: 'Behavioral activation specifically targets the avoidance/withdrawal cycle of depression by scheduling activities that produce mastery and pleasure. Strong evidence base; often as effective as full CBT for depression.' },
    { cat: 'Domain 3', stem: 'A client with a fear of elevators rides progressively higher floors, beginning with one floor while practicing breathing. This is BEST described as:', options: ['Flooding', 'Systematic desensitization with in vivo exposure', 'Cognitive restructuring'], correct: 1, rationale: 'Systematic desensitization (Wolpe) pairs graduated exposure (here, in vivo with floor-by-floor hierarchy) with a relaxation response. Flooding would be prolonged exposure to the highest-anxiety stimulus at once.' },
    { cat: 'Domain 3', stem: 'A client in the precontemplation stage of change is MOST likely to benefit from:', options: ['Detailed relapse-prevention planning', 'Information, raising awareness, and rolling with resistance', 'Daily 12-step meetings starting tomorrow'], correct: 1, rationale: 'Stage-matched intervention. Precontemplation: raise awareness, build discrepancy, do not push action. Action-oriented interventions (relapse plan, meetings) belong to later stages.' },
    { cat: 'Domain 3', stem: 'A clinician uses CPT to help a survivor identify and modify "stuck points" about safety, trust, and self-worth. This is MOST clearly grounded in:', options: ['Cognitive Processing Therapy for PTSD', 'EMDR', 'Person-centered therapy'], correct: 0, rationale: 'CPT (Resick) is a manualized evidence-based PTSD treatment that targets maladaptive cognitions ("stuck points") about safety, trust, power, esteem, intimacy through written impact statements and Socratic dialogue.' },
    { cat: 'Domain 3', stem: 'Two group co-leaders disagree publicly during a session. The MOST appropriate response is to:', options: ['Resolve the disagreement in session for transparency', 'Handle the disagreement privately afterward to avoid splitting and protect group containment', 'Have the senior leader dismiss the junior leader'], correct: 1, rationale: 'Co-leader conflict modeled in front of members can split the group and undermine safety. Handle disagreements in regular co-leader debrief; bring back to the group only what serves members.' },
    { cat: 'Domain 3', stem: 'A behavior plan provides a token for each homework session, exchangeable for screen time. This MOST closely uses:', options: ['Punishment', 'Token economy with positive reinforcement', 'Extinction'], correct: 1, rationale: 'Token economies deliver secondary reinforcers (tokens) on a defined schedule, exchangeable for primary reinforcers (screen time). Effective when behaviors and exchange rates are clear.' },
    { cat: 'Domain 3', stem: 'In ACT, helping a client view a self-critical thought as just a passing event rather than a literal truth is called:', options: ['Cognitive restructuring', 'Cognitive defusion', 'Behavioral activation'], correct: 1, rationale: 'Defusion (one of ACT’s six core processes) creates distance from thoughts so they lose grip without trying to change content. Cognitive restructuring (CBT) tries to change the content of thoughts.' },
    { cat: 'Domain 3', stem: 'A client says, "If I just stop being depressed, I\'ll be a good parent again." An IPT-oriented worker would MOST likely conceptualize this within:', options: ['The grief problem area', 'The interpersonal disputes / role transitions problem area', 'A character defect'], correct: 1, rationale: 'IPT organizes depression-linked relational triggers into four problem areas: grief, interpersonal disputes, role transitions, interpersonal deficits. Parenting struggles often map to role transitions and/or disputes.' },
    { cat: 'Domain 3', stem: 'A new client who is suicidal but not imminent is offered an immediate appointment with a worker who has no specific training in suicidality. The worker should:', options: ['See the client and figure it out', 'See the client now AND seek immediate consultation/supervision and additional training', 'Refuse to see the client'], correct: 1, rationale: 'Scope-of-competence ethics: do not refuse a client in need, but seek supervision, consultation, and concurrent training. Refusal can leave a client without care; unsupervised practice outside competence is also unethical.' },
    { cat: 'Domain 3', stem: 'A client tells her group, "I thought I was the only one who felt this way." This is BEST described as the Yalom factor of:', options: ['Catharsis', 'Universality', 'Altruism'], correct: 1, rationale: 'Universality is the recognition that one’s problems are not unique. It reduces shame and connects members. Catharsis = relief through emotional expression; altruism = the helper benefits from helping.' },
    { cat: 'Domain 3', stem: 'A program evaluator maps inputs, activities, outputs, outcomes, and impact for a new mentoring program. This is:', options: ['A logic model', 'A genogram', 'A SOAP note'], correct: 0, rationale: 'Logic models are visual tools that link program resources and activities to short-, medium-, and long-term outcomes and impact. Foundational for planning and outcome evaluation.' },
    { cat: 'Domain 3', stem: 'A planned termination is approaching after 9 months of weekly work. The MOST appropriate plan is to:', options: ['Stop suddenly to avoid prolonging dependence', 'Give 4-6 weeks notice, review gains, process feelings, plan for warning signs, provide referrals, leave door open', 'Refer to a colleague without further sessions'], correct: 1, rationale: 'Ethical termination requires reasonable notice (often 4-6+ weeks for long-term work), processing, consolidation, relapse planning, and referrals. Abrupt ending = abandonment. Referral without closure misses the developmental work of ending.' },
    { cat: 'Domain 3', stem: 'A clinician offers naloxone education and safer-use information to a client who is not ready to stop using opioids. This approach is MOST accurately:', options: ['Enabling', 'Harm reduction, evidence-based and NASW-endorsed', 'Outside scope of practice'], correct: 1, rationale: 'Harm reduction meets clients where they are, reduces overdose risk, and keeps engagement open. It is endorsed by NASW and SAMHSA and has strong evidence for reducing morbidity and mortality.' },

    // DOMAIN 4 (existing)
    { cat: 'Domain 4', stem: "A client tells the worker she plans to kill her ex-husband and gives details. The MOST appropriate action is:", options: ['Maintain confidentiality and continue therapy.', 'Take reasonable steps to warn/protect the identifiable victim (Tarasoff duty) and consult with supervisor.', 'Wait until she actually commits the act.'], correct: 1, rationale: 'Duty to warn/protect (Tarasoff) applies when there is a credible threat against an identifiable victim. Reasonable steps may include warning the victim, contacting law enforcement, and arranging hospitalization. Maintaining confidentiality is not an option here.' },
    { cat: 'Domain 4', stem: "A client gives the social worker an expensive watch as a \"thank you\" at termination. The MOST appropriate response is:", options: ["Accept gratefully to avoid hurting the client's feelings.", "Decline the gift, explore its meaning, and acknowledge the client's feelings of gratitude.", 'Accept but report to the supervisor.'], correct: 1, rationale: "Significant gifts create dual-relationship dynamics and obligation. Declining respectfully while exploring meaning honors the client's feelings and maintains boundaries. Small symbolic gifts may sometimes be accepted with cultural sensitivity; expensive items should not." },
    { cat: 'Domain 4', stem: 'A social worker learns a colleague is consistently late, irritable, and smells of alcohol at work. The FIRST step is to:', options: ['Report immediately to the licensing board.', 'Talk with the colleague directly to express concerns and encourage seeking help, when safe to do so.', 'Tell other colleagues to avoid working with this person.'], correct: 1, rationale: 'NASW Code generally calls for direct conversation with an impaired colleague first when feasible and safe. If unresolved, escalate to supervisor, employer, then licensing board. Telling third parties about a colleague is unprofessional.' },
    { cat: 'Domain 4', stem: 'A new client signs an informed consent form without reading it. The social worker should:', options: ['Accept the signed form and proceed.', 'Walk through the consent verbally, check comprehension, and confirm understanding.', 'Postpone treatment until the form is fully read.'], correct: 1, rationale: 'Informed consent is a process, not a signature. The social worker has a duty to ensure the client actually understands purpose, risks, limits of confidentiality, fees, alternatives, and rights. Check comprehension; do not just collect a signature.' },
    { cat: 'Domain 4', stem: 'A client asks the social worker to attend her graduation ceremony as a guest. The MOST appropriate response considers:', options: ["Whether attending serves the client's clinical interests and can be done without exploitation; consult and document.", 'Attendance is always appropriate as a sign of support.', 'Attendance is never appropriate under any circumstance.'], correct: 0, rationale: 'This is a potential boundary crossing, not violation. Some attendance (funerals, graduations) may be clinically appropriate and culturally responsive. The test is: does this serve the client, does it risk exploitation, can it be documented and discussed? Consult supervisor. Neither blanket yes nor blanket no.' },
    { cat: 'Domain 4', stem: 'A social worker discovers her case notes were left visible on her unlocked computer screen when she stepped away. She should:', options: ['Quietly close the file and continue.', 'Treat as a privacy incident: assess scope, report per agency policy/HIPAA, mitigate, and review practices.', 'Apologize to the client if they find out.'], correct: 1, rationale: 'Unauthorized disclosure of PHI is a privacy incident requiring HIPAA breach assessment, notification (per agency policy and HIPAA Breach Notification Rule), and mitigation. Quietly ignoring violates ethical and legal duty. Transparent handling is required.' },
    { cat: 'Domain 4', stem: "A social worker is asked by a court to provide testimony about a former client. Without the client's authorization, she should:", options: ['Provide whatever the court requests.', 'Assert privilege on behalf of the client, seek clarification of the court order, and consult an attorney before disclosing.', 'Refuse to attend court.'], correct: 1, rationale: 'Therapist-client privilege belongs to the client. A subpoena alone does not override privilege; a court order specifically compelling disclosure may. Assert privilege, seek clarification, consult attorney. Disclosing without proper authorization is an ethical and legal violation.' },
    { cat: 'Domain 4', stem: 'A social worker provides telehealth to a client who has temporarily traveled to another state. The PRIMARY ethical/legal concern is:', options: ["Whether the social worker is licensed in the client's current state of presence.", 'Whether the client has a stable WiFi connection.', 'Whether the client prefers video or phone.'], correct: 0, rationale: 'Telehealth practice is generally governed by the state where the CLIENT is physically located. Practicing across state lines without licensure in that state can be unlicensed practice. Verify location and licensure before each session. Some compacts (e.g., Social Work Licensure Compact) are emerging.' },
    { cat: 'Domain 4', stem: 'A social worker realizes her religious beliefs make it difficult to work with a client seeking abortion-related support. She should:', options: ['Refuse to see the client and refer immediately.', 'Examine her values, consult supervision, and refer respectfully only if she cannot provide competent, non-judgmental care.', 'Continue working with the client and share her religious views.'], correct: 1, rationale: 'NASW emphasizes self-awareness and competence. Personal values may not be imposed. Examine bias, consult, and refer if needed — but referral should not be reflexive or discriminatory. Sharing religious views to influence a client’s decision is unethical.' },
    { cat: 'Domain 4', stem: "A social worker is contacted by a client's adult sibling asking about treatment. The social worker should:", options: ['Acknowledge the client is in treatment and discuss general progress.', "Neither confirm nor deny the client is in treatment without the client's written authorization.", 'Refuse to take the call.'], correct: 1, rationale: 'Even confirming that someone is a client without their authorization is a confidentiality breach. The professional response: neither confirm nor deny. If the family member has urgent safety concerns, take their information without confirming the relationship.' },
    { cat: 'Domain 4', stem: 'A social worker has been seeing a client for two years and the client invites her to a birthday party with mutual friends present. The MOST appropriate response considers:', options: ['Friends and clients can mix in social settings.', "Attending creates a dual relationship that could compromise treatment; decline and explore the invitation's meaning.", 'Attendance is fine if other professionals are also present.'], correct: 1, rationale: 'Attending a social event with mutual friends creates a dual relationship — social and professional. This can compromise objectivity, confidentiality, and the therapeutic frame. Decline graciously and use the invitation as material for the work.' },
    { cat: 'Domain 4', stem: 'A client has not paid for the past four sessions. Before any consideration of termination, the social worker should:', options: ['Stop services immediately due to non-payment.', 'Discuss the unpaid balance with the client, explore barriers, offer options (payment plan, sliding scale, referral).', 'Send the bill to collections without discussion.'], correct: 1, rationale: 'Ending services for non-payment without first attempting to address the issue is abandonment. The ethical path: discuss, explore, offer alternatives, give reasonable notice if termination becomes necessary, and provide referrals.' },
    { cat: 'Domain 4', stem: 'A supervisor pressures a supervisee to document services that were not delivered to maximize billing. The supervisee should:', options: ['Comply because the supervisor has authority.', 'Refuse to falsify records, document the request, and report through appropriate channels.', 'Quit immediately without explanation.'], correct: 1, rationale: 'Billing fraud is illegal and unethical. Refuse; document the conversation; report through agency channels and, if not resolved, to licensing board and relevant payors. Complying makes the supervisee complicit. Quitting without report leaves the practice ongoing.' },
    { cat: 'Domain 4', stem: "A 15-year-old client discloses she has been sexually active and asks the worker not to tell her parents. In Kansas, the worker's response should:", options: ['Always inform parents of all minor disclosures.', 'Explore the context, assess for abuse/coercion, discuss confidentiality limits with both minor and parents at the outset, and apply Kansas-specific minor consent law as relevant.', 'Promise full confidentiality.'], correct: 1, rationale: 'Confidentiality with minors is nuanced. Discuss limits with both minor and parent at the outset. Assess for abuse, coercion, or risk that may require disclosure. Kansas has specific consent provisions for minors in some areas (mental health, substance use, reproductive). Never promise unlimited confidentiality you cannot keep.' },
    { cat: 'Domain 4', stem: 'A social worker who lives in a small rural town encounters her client at the local grocery store. The MOST appropriate response is:', options: ['Pretend not to see the client to preserve confidentiality.', 'Follow the lead the client sets — brief acknowledgment is acceptable if client initiates — and discuss in next session.', 'Approach the client warmly and chat as friends.'], correct: 1, rationale: 'Small communities make incidental contact inevitable. Follow the client’s lead; do not initiate or extend. Briefly acknowledge if they do. Process in next session: how did that feel, what should we do if it happens again? This is part of small-community practice.' },
    // Domain 4 NEW
    { cat: 'Domain 4', stem: 'A subpoena arrives for a current client’s records without the client’s authorization. The MOST appropriate FIRST step is to:', options: ['Send records by the listed deadline', 'Notify the client, assert privilege, seek clarification of the legal basis, and consult an attorney before any disclosure', 'Destroy the records to avoid disclosure'], correct: 1, rationale: 'A subpoena is not equivalent to a judge’s order compelling disclosure. Notify the client, assert privilege on the client’s behalf, request a court order if needed, and consult an attorney. Disclosing without authorization can be an ethics/legal violation.' },
    { cat: 'Domain 4', stem: 'A school social worker has reasonable suspicion that a 10-year-old is being physically abused at home. In Kansas, the worker MUST:', options: ['Investigate further before reporting', 'Report to the Kansas Protection Report Center (1-800-922-5330)', 'Confront the parent first'], correct: 1, rationale: 'Kansas requires mandated reporters to make a report when there is reasonable suspicion. Reasonable suspicion, not proof, is the standard. Investigation is DCF’s responsibility, not the social worker’s. Confronting the parent risks the child’s safety.' },
    { cat: 'Domain 4', stem: 'A client makes a serious, specific threat to harm a named coworker. The duty to protect (Tarasoff) requires the worker to take reasonable steps, which may include:', options: ['Only documenting the threat in the chart', 'Warning the identifiable victim, contacting law enforcement, and/or arranging hospitalization', 'Maintaining strict confidentiality at all costs'], correct: 1, rationale: 'Tarasoff requires reasonable steps to protect when there is a credible threat against an identifiable victim. Options include warning the victim, notifying law enforcement, and hospitalization. The specific step depends on circumstances; confidentiality must yield.' },
    { cat: 'Domain 4', stem: 'A social worker posts a generic clinical anecdote on social media, including the client’s job title and rare diagnosis. This is:', options: ['Acceptable because no name is used', 'A potential breach of confidentiality — details may identify the client even without a name', 'Acceptable if the worker uses a pseudonym'], correct: 1, rationale: 'Identifiability includes any combination of details that can re-identify a client (rare diagnosis + job + region). Aggregated, fully disguised teaching cases require explicit authorization or strict de-identification.' },
    { cat: 'Domain 4', stem: "A client asks the worker, \"Are you also in recovery?\" The worker considers whether to disclose. The MOST important question is:", options: ['Will it help me build connection?', 'Does this disclosure serve the client’s interests, with clinical purpose I can articulate and document?', 'Does the agency policy require disclosure?'], correct: 1, rationale: 'Self-disclosure is appropriate only when it serves the client (not the worker), is brief, purposeful, and documented. Default toward sparing disclosure; consult when uncertain.' },
    { cat: 'Domain 4', stem: 'A 16-year-old in Kansas presents seeking confidential mental-health treatment without parental involvement. The worker should:', options: ['Refuse to see her without parental consent', 'Know that Kansas allows minors to consent to outpatient mental-health services in defined circumstances; assess clinically and apply applicable law', 'Always notify the parents regardless'], correct: 1, rationale: 'Kansas law permits minors to consent to certain mental-health, substance-use, and reproductive-health services. Application is fact-specific. The worker must know current law and consult when uncertain rather than apply blanket rules.' },
    { cat: 'Domain 4', stem: 'An insurer requires a specific diagnosis to authorize ongoing therapy, and the client does not meet that diagnosis. The MOST ethical response is to:', options: ['Use the diagnosis to keep treatment available', 'Document accurately, explore other coverage paths, advocate for medically necessary care, and inform the client', 'Discharge the client'], correct: 1, rationale: 'Falsifying a diagnosis is fraud and undermines the integrity of the record. Document accurately, advocate, explore alternatives (sliding scale, appeals, different codes that are accurate). Inform the client of options.' },
    { cat: 'Domain 4', stem: "A rural worker discovers the only available client referral is her child's softball coach. The MOST appropriate plan is:", options: ['Refuse the referral on principle', 'Acknowledge the unavoidable dual relationship, set clear boundaries, document, consult, and prioritize client welfare', 'Take the case without disclosure'], correct: 1, rationale: 'Rural and small-community practice often makes some dual relationships unavoidable. The Code does not prohibit unavoidable duals but requires careful management: disclosure, clear boundaries, documentation, consultation.' },
    { cat: 'Domain 4', stem: 'A worker considering termination for non-payment must FIRST:', options: ['Send a final bill and stop services', 'Discuss the unpaid balance with the client, explore barriers, offer reasonable alternatives (payment plan, sliding scale, referral)', 'Refer to collections'], correct: 1, rationale: 'Stopping services for non-payment without first addressing it is abandonment. Discuss, explore, offer alternatives. If termination is necessary, provide reasonable notice and referrals.' },
    { cat: 'Domain 4', stem: 'A client in substance-use treatment requests records be shared with his primary-care physician. Under 42 CFR Part 2, the worker should:', options: ['Share immediately based on verbal consent', 'Obtain a Part 2-compliant written consent specifying recipient, purpose, and expiration', 'Share without consent because it is for treatment'], correct: 1, rationale: '42 CFR Part 2 (SUD records) requires more specific written consent than HIPAA. Each disclosure typically requires a discrete authorization naming the recipient, purpose, and expiration. Recent updates relaxed some provisions but consent rigor remains.' },
    { cat: 'Domain 4', stem: 'A clinician learns her practice partner is also her client’s landlord. The MOST clearly indicated step is to:', options: ['Continue without disclosure', 'Disclose the conflict of interest to the client, consult, and consider transferring care if the conflict cannot be managed', 'Force the partner to drop the landlord relationship'], correct: 1, rationale: 'Conflicts of interest must be disclosed and managed in the client’s interest. If unmanageable, the appropriate move is to change the relationship that creates the conflict — here, typically the practice/clinical role rather than imposing demands on third parties.' },
    { cat: 'Domain 4', stem: 'A clinician finishes a difficult disclosure session and notices persistent nightmares, hyperarousal, and intrusive images about clients’ trauma material. This is MOST consistent with:', options: ['Burnout', 'Secondary traumatic stress / vicarious trauma', 'Compassion fatigue alone'], correct: 1, rationale: 'STS = trauma symptoms from exposure to clients’ trauma content (nightmares, intrusion, hyperarousal). Vicarious trauma is the cognitive shift in worldview. Burnout is workload-driven exhaustion; compassion fatigue is STS + burnout combined.' },
    { cat: 'Domain 4', stem: 'A social worker who has been seeing the same client for six months realizes she is increasingly thinking about the client between sessions and looking forward to those sessions more than is typical. The MOST appropriate response is to:', options: ['Continue without changes', 'Bring the countertransference to supervision/consultation and address how it affects the work', 'Terminate immediately without explanation'], correct: 1, rationale: 'Strong countertransference is data, not catastrophe — it requires reflection and consultation. Untended, it risks boundary problems. Abrupt termination is harmful and unethical without process.' },
  ];

  // ============ FILTER LOGIC ============
  const filteredCards = useMemo(() => {
    let cs = flashcards.filter(c => cardDomains.has(c.cat));
    if (cardStatus === 'flagged')  cs = cs.filter(c => flaggedC.has(cid(c)));
    else if (cardStatus === 'learning') cs = cs.filter(c => learningC.has(cid(c)));
    else if (cardStatus === 'known')    cs = cs.filter(c => knownC.has(cid(c)));
    else if (cardStatus === 'new')      cs = cs.filter(c => !knownC.has(cid(c)) && !learningC.has(cid(c)));
    if (cardOrder === 'shuffle') cs = [...cs].sort(() => Math.random() - 0.5);
    return cs;
  }, [cardDomains, cardStatus, cardOrder, flaggedC, knownC, learningC]);

  const filteredQuestions = useMemo(() => {
    let qs = questions.filter(q => quizDomains.has(q.cat));
    if (quizStatus === 'flagged')      qs = qs.filter(q => flaggedQ.has(qid(q)));
    else if (quizStatus === 'wrong')   qs = qs.filter(q => questionResults[qid(q)] === 'wrong');
    else if (quizStatus === 'unseen')  qs = qs.filter(q => !questionResults[qid(q)]);
    else if (quizStatus === 'correct') qs = qs.filter(q => questionResults[qid(q)] === 'correct');
    if (questionOrder === 'shuffle') qs = [...qs].sort(() => Math.random() - 0.5);
    return qs;
  }, [quizDomains, quizStatus, questionOrder, flaggedQ, questionResults]);

  // Counts (use the domain-scoped set so badges reflect what user is studying)
  const cardCounts = useMemo(() => {
    const inScope = flashcards.filter(c => cardDomains.has(c.cat));
    return {
      total:    inScope.length,
      flagged:  inScope.filter(c => flaggedC.has(cid(c))).length,
      learning: inScope.filter(c => learningC.has(cid(c))).length,
      known:    inScope.filter(c => knownC.has(cid(c))).length,
      fresh:    inScope.filter(c => !knownC.has(cid(c)) && !learningC.has(cid(c))).length,
    };
  }, [cardDomains, flaggedC, knownC, learningC]);

  const quizCounts = useMemo(() => {
    const inScope = questions.filter(q => quizDomains.has(q.cat));
    const correct = inScope.filter(q => questionResults[qid(q)] === 'correct').length;
    const wrong   = inScope.filter(q => questionResults[qid(q)] === 'wrong').length;
    return {
      total:   inScope.length,
      flagged: inScope.filter(q => flaggedQ.has(qid(q))).length,
      correct,
      wrong,
      unseen:  inScope.length - correct - wrong,
    };
  }, [quizDomains, flaggedQ, questionResults]);

  // Per-domain breakdown for the score panel
  const domainScores = useMemo(() => {
    const out = {};
    ALL_DOMS.forEach(d => {
      const inD = questions.filter(q => q.cat === d);
      const c = inD.filter(q => questionResults[qid(q)] === 'correct').length;
      const w = inD.filter(q => questionResults[qid(q)] === 'wrong').length;
      out[d] = { total: inD.length, correct: c, wrong: w, answered: c + w };
    });
    return out;
  }, [questionResults]);

  const sessionScore = useMemo(() => {
    const vals = Object.values(questionResults);
    return { correct: vals.filter(v => v === 'correct').length, answered: vals.length };
  }, [questionResults]);

  // Safe indexing (filters can be empty)
  const safeCard = filteredCards.length ? filteredCards[flashcardIndex % filteredCards.length] : null;
  const safeQ    = filteredQuestions.length ? filteredQuestions[currentQ % filteredQuestions.length] : null;

  // Domain-toggle helpers (keep at least one selected)
  const toggleQuizDomain = (d) => {
    setQuizDomains(prev => {
      const next = new Set(prev);
      if (next.has(d)) { if (next.size === 1) return prev; next.delete(d); }
      else next.add(d);
      return next;
    });
    setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false);
  };
  const toggleCardDomain = (d) => {
    setCardDomains(prev => {
      const next = new Set(prev);
      if (next.has(d)) { if (next.size === 1) return prev; next.delete(d); }
      else next.add(d);
      return next;
    });
    setFlashcardIndex(0); setFlashcardFlipped(false);
  };

  // Status filter setters (also reset index)
  const setQuizStatusFilter = (s) => { setQuizStatus(s); setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false); };
  const setCardStatusFilter = (s) => { setCardStatus(s); setFlashcardIndex(0); setFlashcardFlipped(false); };

  // Flag toggles
  const toggleFlagQ = (q) => {
    if (!q) return;
    setFlaggedQ(prev => {
      const next = new Set(prev); const id = qid(q);
      if (next.has(id)) next.delete(id); else next.add(id);
      saveSet('flagQ', next); return next;
    });
  };
  const toggleFlagC = (c) => {
    if (!c) return;
    setFlaggedC(prev => {
      const next = new Set(prev); const id = cid(c);
      if (next.has(id)) next.delete(id); else next.add(id);
      saveSet('flagC', next); return next;
    });
  };

  // Card mastery
  const markKnown = (c) => {
    if (!c) return; const id = cid(c);
    setKnownC(prev => { const n = new Set(prev); n.add(id); saveSet('knownC', n); return n; });
    setLearningC(prev => { const n = new Set(prev); n.delete(id); saveSet('learningC', n); return n; });
    nextCard();
  };
  const markLearning = (c) => {
    if (!c) return; const id = cid(c);
    setLearningC(prev => { const n = new Set(prev); n.add(id); saveSet('learningC', n); return n; });
    setKnownC(prev => { const n = new Set(prev); n.delete(id); saveSet('knownC', n); return n; });
    nextCard();
  };
  const clearMastery = (c) => {
    if (!c) return; const id = cid(c);
    setKnownC(prev => { const n = new Set(prev); n.delete(id); saveSet('knownC', n); return n; });
    setLearningC(prev => { const n = new Set(prev); n.delete(id); saveSet('learningC', n); return n; });
  };

  // Question answer
  const handleAnswer = (idx) => {
    if (selectedAnswer !== null || !safeQ) return;
    setSelectedAnswer(idx);
    if (studyMode === 'study') setShowRationale(true);
    const result = idx === safeQ.correct ? 'correct' : 'wrong';
    setQuestionResults(prev => {
      const next = { ...prev, [qid(safeQ)]: result };
      saveObj('qResults', next);
      return next;
    });
  };
  const revealRationale = () => setShowRationale(true);

  // Navigation
  const nextQuestion = () => {
    if (!filteredQuestions.length) return;
    setCurrentQ(q => (q + 1) % filteredQuestions.length);
    setSelectedAnswer(null); setShowRationale(false);
  };
  const prevQuestion = () => {
    if (!filteredQuestions.length) return;
    setCurrentQ(q => (q - 1 + filteredQuestions.length) % filteredQuestions.length);
    setSelectedAnswer(null); setShowRationale(false);
  };
  const jumpToQuestion = (i) => { setCurrentQ(i); setSelectedAnswer(null); setShowRationale(false); };

  const nextCard = () => {
    if (!filteredCards.length) return;
    setFlashcardFlipped(false);
    setTimeout(() => setFlashcardIndex(i => (i + 1) % filteredCards.length), 150);
  };
  const prevCard = () => {
    if (!filteredCards.length) return;
    setFlashcardFlipped(false);
    setTimeout(() => setFlashcardIndex(i => (i - 1 + filteredCards.length) % filteredCards.length), 150);
  };
  const jumpToCard = (i) => { setFlashcardFlipped(false); setFlashcardIndex(i); };

  // Reset progress (with confirm)
  const resetQuizProgress = () => {
    if (!window.confirm('Reset all practice progress?\nThis clears correct/wrong tracking for every question. Flags are kept.')) return;
    setQuestionResults({}); saveObj('qResults', {});
    setCurrentQ(0); setSelectedAnswer(null); setShowRationale(false);
  };
  const resetCardProgress = () => {
    if (!window.confirm('Reset all flashcard progress?\nThis clears Known/Learning marks. Flags are kept.')) return;
    setKnownC(new Set()); saveSet('knownC', new Set());
    setLearningC(new Set()); saveSet('learningC', new Set());
    setFlashcardIndex(0); setFlashcardFlipped(false);
  };
  const clearAllFlagsQ = () => {
    if (!window.confirm('Clear all flagged questions?')) return;
    setFlaggedQ(new Set()); saveSet('flagQ', new Set());
  };
  const clearAllFlagsC = () => {
    if (!window.confirm('Clear all flagged flashcards?')) return;
    setFlaggedC(new Set()); saveSet('flagC', new Set());
  };

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      const t = e.target;
      if (!t || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
      if (activeTab === 'flashcards' && safeCard) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); prevCard(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); nextCard(); }
        else if (e.key === ' ')          { e.preventDefault(); setFlashcardFlipped(f => !f); }
        else if (e.key.toLowerCase() === 'f') { e.preventDefault(); toggleFlagC(safeCard); }
        else if (e.key.toLowerCase() === 'k') { e.preventDefault(); markKnown(safeCard); }
        else if (e.key.toLowerCase() === 'l') { e.preventDefault(); markLearning(safeCard); }
        else if (e.key.toLowerCase() === 'p') {
          e.preventDefault();
          const text = flashcardFlipped ? safeCard.back : safeCard.front;
          const id   = (flashcardFlipped ? 'c-back-' : 'c-front-') + cid(safeCard);
          speak(text, id);
        }
      } else if (activeTab === 'practice' && safeQ) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); prevQuestion(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); nextQuestion(); }
        else if (e.key === ' ' && selectedAnswer !== null) { e.preventDefault(); nextQuestion(); }
        else if (e.key.toLowerCase() === 'f') { e.preventDefault(); toggleFlagQ(safeQ); }
        else if (e.key.toLowerCase() === 'r' && selectedAnswer !== null) { e.preventDefault(); revealRationale(); }
        else if (e.key.toLowerCase() === 'p') {
          e.preventDefault();
          if (showRationale) speak(safeQ.rationale, 'q-rationale-' + qid(safeQ));
          else speak(safeQ.stem, 'q-stem-' + qid(safeQ));
        }
        else if (/^[1-9]$/.test(e.key) && selectedAnswer === null) {
          const idx = parseInt(e.key, 10) - 1;
          if (idx < safeQ.options.length) { e.preventDefault(); handleAnswer(idx); }
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [activeTab, safeCard, safeQ, selectedAnswer, filteredCards.length, filteredQuestions.length, studyMode, flashcardFlipped, showRationale, ttsEnabled, ttsRate, ttsVoiceURI, voices, speakingId]);

  const tabs = [
    { id: 'overview', label: 'Overview', iconName: 'BookOpen' },
    { id: 'domains', label: 'Domains', iconName: 'Layers' },
    { id: 'flashcards', label: 'Flashcards', iconName: 'Brain' },
    { id: 'practice', label: 'Practice', iconName: 'Target' },
    { id: 'kansas', label: 'Kansas', iconName: 'MapPin' },

  const domainEntries = Object.entries(domains);
  const currentDomain = domains[activeDomain];

  return (

                  <li><span className="font-display font-bold text-amber-200">1. Safety first.</span> If a vignette involves risk to client or others, the answer almost always involves assessing or protecting safety before exploring feelings or planning.</li>

                    ))}

            <div className="bg-white/70 border border-stone-300 p-4 sm:p-5 divide-y divide-stone-200">
              <FilterRow label="Domains">
                {ALL_DOMS.map(d => (
                  <Chip key={d} active={cardDomains.has(d)} onClick={() => toggleCardDomain(d)}

                  <Icon name="Star" size={11} fill={cardStatus === 'flagged' ? 'currentColor' : 'none'} /> Flagged
                </Chip>
                <Chip active={cardStatus === 'learning'} onClick={() => setCardStatusFilter('learning')} color="sky"     count={cardCounts.learning}>
                  <Icon name="Lightbulb" size={11} /> Learning

                <Chip active={cardStatus === 'known'}    onClick={() => setCardStatusFilter('known')}    color="emerald" count={cardCounts.known}>
                  <Icon name="Check" size={11} /> Known

                <Chip active={cardStatus === 'new'}      onClick={() => setCardStatusFilter('new')}      count={cardCounts.fresh}>New</Chip>

              <FilterRow label="Order">
                <Chip active={cardOrder === 'sequential'} onClick={() => { setCardOrder('sequential'); setFlashcardIndex(0); }}>Sequential</Chip>
                <Chip active={cardOrder === 'shuffle'}    onClick={() => { setCardOrder('shuffle'); setFlashcardIndex(0); }} color="amber">

                <button onClick={() => setCardPaletteOpen(o => !o)}
                  className="font-body text-xs px-3 py-1.5 rounded-full border border-stone-400 bg-white/60 text-stone-700 hover:bg-stone-200 inline-flex items-center gap-1">
                  <Icon name="Grid" size={11} /> {cardPaletteOpen ? 'Hide palette' : 'Show palette'}

                <button onClick={resetCardProgress}

              {ttsAvailable && (
